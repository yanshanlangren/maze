<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D迷宫逃脱 - 躲避陨石</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        
        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        
        #gameCanvas {
            display: block;
        }
        
        /* UI 覆盖层 */
        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            pointer-events: none;
            z-index: 100;
        }
        
        .top-bar {
            display: flex;
            justify-content: space-between;
            padding: 20px;
        }
        
        .stat-box {
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 25px;
            border-radius: 10px;
            color: #fff;
            font-size: 18px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }
        
        .stat-box.level {
            color: #ffd700;
            font-weight: bold;
        }
        
        .stat-box.lives {
            color: #ff6b6b;
        }
        
        /* 准星 */
        .crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            pointer-events: none;
        }
        
        .crosshair::before,
        .crosshair::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.7);
        }
        
        .crosshair::before {
            width: 2px;
            height: 20px;
            left: 9px;
            top: 0;
        }
        
        .crosshair::after {
            width: 20px;
            height: 2px;
            left: 0;
            top: 9px;
        }
        
        /* 提示信息 */
        .hint-box {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 30px;
            border-radius: 10px;
            color: #aaa;
            font-size: 14px;
            pointer-events: none;
        }
        
        /* 开始界面 */
        #startScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
        }
        
        #startScreen h1 {
            font-size: 4rem;
            color: #ffd700;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
            margin-bottom: 20px;
        }
        
        #startScreen .subtitle {
            font-size: 1.5rem;
            color: #ff6b6b;
            margin-bottom: 50px;
        }
        
        .start-btn {
            background: linear-gradient(45deg, #ffd700, #ffaa00);
            color: #000;
            border: none;
            padding: 20px 60px;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            pointer-events: auto;
        }
        
        .start-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.6);
        }
        
        .instructions {
            margin-top: 40px;
            color: #888;
            text-align: center;
            line-height: 2;
        }
        
        .instructions span {
            display: inline-block;
            background: rgba(255, 255, 255, 0.1);
            padding: 5px 15px;
            border-radius: 5px;
            margin: 0 5px;
        }
        
        /* 关卡过渡 */
        #levelTransition {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 250;
        }
        
        #levelTransition h2 {
            font-size: 3rem;
            color: #4ade80;
            margin-bottom: 20px;
        }
        
        #levelTransition p {
            font-size: 1.5rem;
            color: #fff;
        }
        
        /* 游戏结束 */
        #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 300;
        }
        
        #gameOverScreen h2 {
            font-size: 4rem;
            color: #ff6b6b;
            margin-bottom: 30px;
        }
        
        #gameOverScreen p {
            font-size: 1.3rem;
            color: #aaa;
            margin-bottom: 40px;
        }
        
        .restart-btn {
            background: linear-gradient(45deg, #ff6b6b, #ff8e8e);
            color: #fff;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .restart-btn:hover {
            transform: scale(1.05);
        }
        
        /* 胜利界面 */
        #victoryScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 350;
        }
        
        #victoryScreen h2 {
            font-size: 4rem;
            color: #ffd700;
            text-shadow: 0 0 50px rgba(255, 215, 0, 0.8);
            margin-bottom: 30px;
        }
        
        /* 警告闪烁 */
        .warning {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: radial-gradient(ellipse at center, transparent 50%, rgba(255, 0, 0, 0.3) 100%);
            opacity: 0;
            transition: opacity 0.1s;
            z-index: 150;
        }
        
        .warning.active {
            opacity: 1;
        }
        
        /* 移动端虚拟摇杆 */
        #mobileControls {
            display: none;
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 100%;
            justify-content: space-between;
            padding: 0 30px;
            pointer-events: auto;
            z-index: 100;
        }
        
        .joystick-area {
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.3);
            position: relative;
        }
        
        .joystick-knob {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        
        @media (max-width: 768px) {
            #mobileControls {
                display: flex;
            }
            .hint-box {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <!-- 游戏画布 -->
        <canvas id="gameCanvas"></canvas>
        
        <!-- UI 覆盖层 -->
        <div class="ui-overlay">
            <div class="top-bar">
                <div class="stat-box level">关卡: <span id="levelNum">1</span> / 16</div>
                <div class="stat-box lives">生命: <span id="lives">❤️❤️❤️</span></div>
            </div>
        </div>
        
        <!-- 准星 -->
        <div class="crosshair"></div>
        
        <!-- 警告效果 -->
        <div class="warning" id="warning"></div>
        
        <!-- 操作提示 -->
        <div class="hint-box">
            <span>W A S D</span> 移动 | <span>空格</span> 跳跃 | <span>鼠标</span> 转向 | <span style="color:#ff6b6b">红色陷阱</span>要跳过去
        </div>
        
        <!-- 移动端控制 -->
        <div id="mobileControls">
            <div class="joystick-area" id="moveJoystick">
                <div class="joystick-knob" id="moveKnob"></div>
            </div>
        </div>
        
        <!-- 开始界面 -->
        <div id="startScreen">
            <h1>🌌 3D迷宫逃脱 🌌</h1>
            <p class="subtitle">躲避陨石，找到出口！</p>
            <button class="start-btn" id="startBtn">开始游戏</button>
            <div class="instructions">
                <p><span>W A S D</span> 或 <span>方向键</span> 移动</p>
                <p><span>空格键</span> 跳跃躲避陷阱</p>
                <p><span>鼠标</span> 控制视角</p>
                <p><span style="color:#00ff00">绿色</span> 起点 | <span style="color:#ffd700">金色</span> 终点 | <span style="color:#ff0000">红色</span> 陷阱</p>
                <p>躲避<span style="color:#ff6b6b">陨石</span>，跳过陷阱，到达出口！</p>
            </div>
        </div>
        
        <!-- 关卡过渡 -->
        <div id="levelTransition">
            <h2>关卡完成！</h2>
            <p>准备进入下一关...</p>
        </div>
        
        <!-- 游戏结束 -->
        <div id="gameOverScreen">
            <h2>💀 游戏结束 💀</h2>
            <p>你在第 <span id="deathLevel">1</span> 关倒下了...</p>
            <button class="restart-btn" id="restartBtn">重新开始</button>
        </div>
        
        <!-- 胜利界面 -->
        <div id="victoryScreen">
            <h2>🏆 恭喜通关！🏆</h2>
            <p style="color: #ffd700; font-size: 1.5rem;">你成功通过了所有16关！</p>
            <button class="start-btn" id="playAgainBtn" style="margin-top: 30px;">再玩一次</button>
        </div>
    </div>
    
    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script>
        // ============ 游戏配置 ============
        const CONFIG = {
            CELL_SIZE: 4,
            WALL_HEIGHT: 3,
            PLAYER_HEIGHT: 1.6,
            PLAYER_RADIUS: 0.3,
            MOVE_SPEED: 8,
            ACCELERATION: 25,      // 加速度
            FRICTION: 8,           // 摩擦力/减速
            JUMP_FORCE: 8,         // 跳跃力度
            GRAVITY: 20,           // 重力
            METEORITE_DAMAGE_RADIUS: 2,
            METEORITE_FALL_SPEED: 15,
            WARNING_TIME: 1500, // 警告时间ms
        };
        
        // ============ 关卡配置 ============
        const LEVELS = [];
        for (let i = 1; i <= 16; i++) {
            LEVELS.push({
                mazeSize: 7 + Math.floor(i / 2), // 7x7 到 15x15
                meteorites: Math.min(2 + i, 20), // 陨石数量递增
                meteorInterval: Math.max(3000 - i * 100, 1000), // 陨石间隔递减
            });
        }
        
        // ============ 游戏状态 ============
        let scene, camera, renderer;
        let player = {
            position: new THREE.Vector3(),
            velocity: new THREE.Vector3(),     // 水平速度
            verticalVelocity: 0,               // 垂直速度（跳跃/重力）
            rotation: { x: 0, y: 0 },
            lives: 3,
            isGrounded: true,                  // 是否在地面上
        };
        let currentLevel = 1;
        let maze = [];
        let mazeGroup;
        let meteorites = [];
        let traps = [];                        // 陷阱数组
        let exitMarker;
        let gameRunning = false;
        let gamePaused = false;
        let keys = {};
        let lastMeteorTime = 0;
        let warningElements = [];
        
        // ============ 初始化 Three.js ============
        function initThreeJS() {
            // 场景
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a1a);
            scene.fog = new THREE.Fog(0x0a0a1a, 10, 60);
            
            // 相机（第一人称）
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.y = CONFIG.PLAYER_HEIGHT;
            
            // 渲染器
            renderer = new THREE.WebGLRenderer({ 
                canvas: document.getElementById('gameCanvas'),
                antialias: true 
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            
            // 光照
            const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
            scene.add(ambientLight);
            
            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(50, 100, 50);
            directionalLight.castShadow = true;
            directionalLight.shadow.mapSize.width = 2048;
            directionalLight.shadow.mapSize.height = 2048;
            scene.add(directionalLight);
            
            // 事件监听
            window.addEventListener('resize', onWindowResize);
            document.addEventListener('keydown', (e) => keys[e.code] = true);
            document.addEventListener('keyup', (e) => keys[e.code] = false);
            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('click', requestPointerLock);
        }
        
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        function requestPointerLock() {
            if (gameRunning && !gamePaused) {
                document.body.requestPointerLock();
            }
        }
        
        function onMouseMove(event) {
            if (document.pointerLockElement !== document.body || !gameRunning || gamePaused) return;
            
            const sensitivity = 0.002;
            player.rotation.y -= event.movementX * sensitivity;
            player.rotation.x -= event.movementY * sensitivity;
            // 限制上下视角角度为 45度，模拟人正常视角
            player.rotation.x = Math.max(-Math.PI / 4, Math.min(Math.PI / 4, player.rotation.x));
        }
        
        // ============ 迷宫生成 ============
        function generateMaze(size) {
            const maze = [];
            for (let y = 0; y < size; y++) {
                maze[y] = [];
                for (let x = 0; x < size; x++) {
                    maze[y][x] = 1; // 1 = 墙
                }
            }
            
            // 深度优先搜索生成迷宫
            const stack = [[1, 1]];
            maze[1][1] = 0;
            
            const directions = [[0, 2], [2, 0], [0, -2], [-2, 0]];
            
            while (stack.length > 0) {
                const [cx, cy] = stack[stack.length - 1];
                const neighbors = [];
                
                for (const [dx, dy] of directions) {
                    const nx = cx + dx;
                    const ny = cy + dy;
                    if (nx > 0 && nx < size - 1 && ny > 0 && ny < size - 1 && maze[ny][nx] === 1) {
                        neighbors.push([nx, ny, dx / 2, dy / 2]);
                    }
                }
                
                if (neighbors.length > 0) {
                    const [nx, ny, dx, dy] = neighbors[Math.floor(Math.random() * neighbors.length)];
                    maze[cy + dy][cx + dx] = 0;
                    maze[ny][nx] = 0;
                    stack.push([nx, ny]);
                } else {
                    stack.pop();
                }
            }
            
            // 确保入口和出口可达
            maze[1][1] = 0; // 入口
            maze[size - 2][size - 2] = 0; // 出口
            
            return maze;
        }
        
        // ============ 创建3D迷宫 ============
        function createMaze3D(mazeData) {
            // 清除旧迷宫
            if (mazeGroup) {
                scene.remove(mazeGroup);
            }
            
            mazeGroup = new THREE.Group();
            const size = mazeData.length;
            const cellSize = CONFIG.CELL_SIZE;
            const wallHeight = CONFIG.WALL_HEIGHT;
            
            // 地板材质
            const floorMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x2d3a4d,
                roughness: 0.8 
            });
            
            // 墙壁材质 - 鲜艳的青蓝色
            const wallMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x1e90ff,
                roughness: 0.4,
                metalness: 0.1
            });
            
            // 创建地板
            const floorGeometry = new THREE.PlaneGeometry(size * cellSize, size * cellSize);
            const floor = new THREE.Mesh(floorGeometry, floorMaterial);
            floor.rotation.x = -Math.PI / 2;
            floor.position.set(size * cellSize / 2 - cellSize / 2, 0, size * cellSize / 2 - cellSize / 2);
            floor.receiveShadow = true;
            mazeGroup.add(floor);
            
            // 创建墙壁（延伸到天花板）
            const ceilingHeight = wallHeight + cellSize;
            const wallGeometry = new THREE.BoxGeometry(cellSize, ceilingHeight, cellSize);
            
            for (let y = 0; y < size; y++) {
                for (let x = 0; x < size; x++) {
                    if (mazeData[y][x] === 1) {
                        const wall = new THREE.Mesh(wallGeometry, wallMaterial);
                        wall.position.set(x * cellSize, ceilingHeight / 2, y * cellSize);
                        wall.castShadow = true;
                        wall.receiveShadow = true;
                        mazeGroup.add(wall);
                    }
                }
            }
            
            // 创建天花板（封闭迷宫，比跳跃高度高一格）
            const ceilingMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x1a1a2e,
                roughness: 0.9,
                side: THREE.BackSide
            });
            const ceilingGeometry = new THREE.PlaneGeometry(size * cellSize, size * cellSize);
            const ceiling = new THREE.Mesh(ceilingGeometry, ceilingMaterial);
            ceiling.rotation.x = Math.PI / 2;
            ceiling.position.set(size * cellSize / 2 - cellSize / 2, ceilingHeight, size * cellSize / 2 - cellSize / 2);
            mazeGroup.add(ceiling);
            
            // 天花板灯光（让迷宫更明亮）
            const ceilingLight = new THREE.PointLight(0x8888ff, 0.5, 100);
            ceilingLight.position.set(size * cellSize / 2, ceilingHeight - 0.5, size * cellSize / 2);
            mazeGroup.add(ceilingLight);
            
            // 创建入口标记（绿色）
            const entranceGeometry = new THREE.BoxGeometry(cellSize * 0.8, 0.1, cellSize * 0.8);
            const entranceMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x00ff00, 
                emissive: 0x00ff00,
                emissiveIntensity: 0.5 
            });
            const entrance = new THREE.Mesh(entranceGeometry, entranceMaterial);
            entrance.position.set(1 * cellSize, 0.1, 1 * cellSize);
            mazeGroup.add(entrance);
            
            // 入口灯光
            const entranceLight = new THREE.PointLight(0x00ff00, 2, 10);
            entranceLight.position.set(1 * cellSize, 2, 1 * cellSize);
            mazeGroup.add(entranceLight);
            
            // 创建出口标记（金色）
            const exitGeometry = new THREE.BoxGeometry(cellSize * 0.8, 0.1, cellSize * 0.8);
            const exitMaterial = new THREE.MeshStandardMaterial({ 
                color: 0xffd700, 
                emissive: 0xffd700,
                emissiveIntensity: 0.8 
            });
            exitMarker = new THREE.Mesh(exitGeometry, exitMaterial);
            exitMarker.position.set((size - 2) * cellSize, 0.1, (size - 2) * cellSize);
            mazeGroup.add(exitMarker);
            
            // 出口灯光
            const exitLight = new THREE.PointLight(0xffd700, 3, 15);
            exitLight.position.set((size - 2) * cellSize, 3, (size - 2) * cellSize);
            mazeGroup.add(exitLight);
            
            // 出口光柱
            const beamGeometry = new THREE.CylinderGeometry(0.5, 0.5, 20, 16);
            const beamMaterial = new THREE.MeshBasicMaterial({ 
                color: 0xffd700, 
                transparent: true, 
                opacity: 0.2 
            });
            const beam = new THREE.Mesh(beamGeometry, beamMaterial);
            beam.position.set((size - 2) * cellSize, 10, (size - 2) * cellSize);
            mazeGroup.add(beam);
            
            // 生成地面陷阱
            generateTraps(mazeData, cellSize, size);
            
            scene.add(mazeGroup);
            
            return {
                entrance: { x: 1, z: 1 },
                exit: { x: size - 2, z: size - 2 }
            };
        }
        
        // ============ 陷阱系统 ============
        function generateTraps(mazeData, cellSize, size) {
            // 清除旧陷阱
            traps.forEach(t => scene.remove(t.mesh));
            traps = [];
            
            // 根据关卡决定陷阱数量
            const trapCount = Math.min(3 + currentLevel, 15);
            let placed = 0;
            let attempts = 0;
            
            while (placed < trapCount && attempts < 200) {
                const x = Math.floor(Math.random() * (size - 2)) + 1;
                const z = Math.floor(Math.random() * (size - 2)) + 1;
                
                // 确保在通道上，且不在入口、出口附近
                if (mazeData[z][x] === 0 && !(x === 1 && z === 1) && !(x === size - 2 && z === size - 2)) {
                    // 检查是否已有陷阱
                    const hasTrap = traps.some(t => t.x === x && t.z === z);
                    
                    // 检查相邻格子是否有陷阱（避免连续陷阱）
                    const hasAdjacentTrap = traps.some(t => 
                        (Math.abs(t.x - x) + Math.abs(t.z - z)) <= 1
                    );
                    
                    if (!hasTrap && !hasAdjacentTrap) {
                        const trap = createTrap(x, z, cellSize);
                        traps.push(trap);
                        placed++;
                    }
                }
                attempts++;
            }
        }
        
        function createTrap(x, z, cellSize) {
            // 陷阱更小（50%大小），可以贴墙通过
            const trapSize = cellSize * 0.5;
            const geometry = new THREE.BoxGeometry(trapSize, 0.15, trapSize);
            const material = new THREE.MeshStandardMaterial({ 
                color: 0xff0000, 
                emissive: 0xff0000,
                emissiveIntensity: 0.3,
                transparent: true,
                opacity: 0.8
            });
            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.set(x * cellSize, 0.08, z * cellSize);
            scene.add(mesh);
            
            return { x, z, mesh, cellSize, trapSize };
        }
        
        function checkTrapCollision() {
            if (!player.isGrounded) return false; // 跳跃时不触发陷阱
            
            for (const trap of traps) {
                const px = player.position.x / CONFIG.CELL_SIZE;
                const pz = player.position.z / CONFIG.CELL_SIZE;
                // 碰撞范围与陷阱大小匹配（0.25格半径）
                const dist = Math.sqrt((px - trap.x) ** 2 + (pz - trap.z) ** 2);
                
                if (dist < 0.25) {
                    return true;
                }
            }
            return false;
        }
        
        // ============ 陨石系统 ============
        class Meteorite {
            constructor(x, z, fallDelay) {
                this.x = x;
                this.z = z;
                this.fallDelay = fallDelay;
                this.y = 50;
                this.falling = false;
                this.hit = false;
                this.warningTime = 0;
                
                // 创建陨石模型
                const geometry = new THREE.IcosahedronGeometry(1, 1);
                const material = new THREE.MeshStandardMaterial({ 
                    color: 0xff4400,
                    emissive: 0xff2200,
                    emissiveIntensity: 0.5,
                    roughness: 0.3
                });
                this.mesh = new THREE.Mesh(geometry, material);
                this.mesh.position.set(x * CONFIG.CELL_SIZE, this.y, z * CONFIG.CELL_SIZE);
                this.mesh.castShadow = true;
                
                // 火焰效果
                const fireGeometry = new THREE.SphereGeometry(1.3, 8, 8);
                const fireMaterial = new THREE.MeshBasicMaterial({ 
                    color: 0xff6600, 
                    transparent: true, 
                    opacity: 0.4 
                });
                this.fire = new THREE.Mesh(fireGeometry, fireMaterial);
                this.mesh.add(this.fire);
                
                // 警告标记
                const warningGeometry = new THREE.RingGeometry(1.5, 2, 32);
                const warningMaterial = new THREE.MeshBasicMaterial({ 
                    color: 0xff0000, 
                    transparent: true, 
                    opacity: 0,
                    side: THREE.DoubleSide
                });
                this.warningMarker = new THREE.Mesh(warningGeometry, warningMaterial);
                this.warningMarker.rotation.x = -Math.PI / 2;
                this.warningMarker.position.set(x * CONFIG.CELL_SIZE, 0.1, z * CONFIG.CELL_SIZE);
                
                scene.add(this.mesh);
                scene.add(this.warningMarker);
            }
            
            update(deltaTime, playerPos) {
                if (this.hit) return;
                
                // 延迟开始下落
                this.fallDelay -= deltaTime;
                if (this.fallDelay <= CONFIG.WARNING_TIME && !this.falling) {
                    // 显示警告
                    this.warningMarker.material.opacity = 0.5 + Math.sin(Date.now() / 100) * 0.3;
                }
                
                if (this.fallDelay <= 0 && !this.falling) {
                    this.falling = true;
                }
                
                if (this.falling) {
                    this.y -= CONFIG.METEORITE_FALL_SPEED * deltaTime;
                    this.mesh.position.y = this.y;
                    this.mesh.rotation.x += 0.1;
                    this.mesh.rotation.z += 0.1;
                    
                    // 隐藏警告
                    this.warningMarker.material.opacity = 0;
                    
                    // 检测撞击
                    if (this.y <= CONFIG.PLAYER_HEIGHT) {
                        this.hit = true;
                        
                        // 检测玩家是否在范围内
                        const dx = playerPos.x - this.x * CONFIG.CELL_SIZE;
                        const dz = playerPos.z - this.z * CONFIG.CELL_SIZE;
                        const dist = Math.sqrt(dx * dx + dz * dz);
                        
                        if (dist < CONFIG.METEORITE_DAMAGE_RADIUS * CONFIG.CELL_SIZE) {
                            return true; // 玩家被击中
                        }
                        
                        // 撞击地面效果
                        this.createImpact();
                    }
                }
                
                return false;
            }
            
            createImpact() {
                // 移除陨石，创建撞击效果
                scene.remove(this.mesh);
                scene.remove(this.warningMarker);
                
                // 撞击粒子效果
                const particleCount = 20;
                for (let i = 0; i < particleCount; i++) {
                    const geometry = new THREE.SphereGeometry(0.2, 4, 4);
                    const material = new THREE.MeshBasicMaterial({ 
                        color: 0xff4400,
                        transparent: true
                    });
                    const particle = new THREE.Mesh(geometry, material);
                    particle.position.set(
                        this.x * CONFIG.CELL_SIZE,
                        0.5,
                        this.z * CONFIG.CELL_SIZE
                    );
                    particle.velocity = new THREE.Vector3(
                        (Math.random() - 0.5) * 10,
                        Math.random() * 10,
                        (Math.random() - 0.5) * 10
                    );
                    particle.life = 1;
                    scene.add(particle);
                    
                    // 简单动画
                    const animate = () => {
                        particle.life -= 0.02;
                        if (particle.life <= 0) {
                            scene.remove(particle);
                            return;
                        }
                        particle.position.add(particle.velocity.clone().multiplyScalar(0.02));
                        particle.velocity.y -= 0.3;
                        particle.material.opacity = particle.life;
                        requestAnimationFrame(animate);
                    };
                    animate();
                }
            }
            
            remove() {
                scene.remove(this.mesh);
                scene.remove(this.warningMarker);
            }
        }
        
        // ============ 生成陨石 ============
        function spawnMeteorite() {
            const level = LEVELS[currentLevel - 1];
            const size = level.mazeSize;
            
            // 找到玩家附近的可行走位置
            let attempts = 0;
            while (attempts < 50) {
                const x = Math.floor(Math.random() * (size - 2)) + 1;
                const z = Math.floor(Math.random() * (size - 2)) + 1;
                
                if (maze[z][x] === 0) {
                    // 确保不在入口和出口
                    if ((x === 1 && z === 1) || (x === size - 2 && z === size - 2)) {
                        attempts++;
                        continue;
                    }
                    
                    // 确保不在玩家当前位置（给玩家反应时间）
                    const px = Math.floor(player.position.x / CONFIG.CELL_SIZE);
                    const pz = Math.floor(player.position.z / CONFIG.CELL_SIZE);
                    const dist = Math.abs(x - px) + Math.abs(z - pz);
                    
                    if (dist > 2) {
                        const meteorite = new Meteorite(x, z, CONFIG.WARNING_TIME + Math.random() * 500);
                        meteorites.push(meteorite);
                        return;
                    }
                }
                attempts++;
            }
        }
        
        // ============ 碰撞检测 ============
        function checkWallCollision(newX, newZ) {
            const cellX = Math.floor(newX / CONFIG.CELL_SIZE + 0.5);
            const cellZ = Math.floor(newZ / CONFIG.CELL_SIZE + 0.5);
            
            // 检查周围的墙壁
            const radius = CONFIG.PLAYER_RADIUS;
            const checks = [
                [newX - radius, newZ - radius],
                [newX + radius, newZ - radius],
                [newX - radius, newZ + radius],
                [newX + radius, newZ + radius],
            ];
            
            for (const [cx, cz] of checks) {
                const mx = Math.floor(cx / CONFIG.CELL_SIZE + 0.5);
                const mz = Math.floor(cz / CONFIG.CELL_SIZE + 0.5);
                
                if (mx < 0 || mx >= maze[0].length || mz < 0 || mz >= maze.length) {
                    return true;
                }
                
                if (maze[mz][mx] === 1) {
                    return true;
                }
            }
            
            return false;
        }
        
        // ============ 检查是否到达出口 ============
        function checkExit() {
            const level = LEVELS[currentLevel - 1];
            const size = level.mazeSize;
            const exitX = (size - 2) * CONFIG.CELL_SIZE;
            const exitZ = (size - 2) * CONFIG.CELL_SIZE;
            
            const dx = player.position.x - exitX;
            const dz = player.position.z - exitZ;
            const dist = Math.sqrt(dx * dx + dz * dz);
            
            return dist < CONFIG.CELL_SIZE * 0.8;
        }
        
        // ============ 关卡管理 ============
        function loadLevel(levelNum) {
            currentLevel = levelNum;
            const level = LEVELS[levelNum - 1];
            
            // 清除旧陨石
            meteorites.forEach(m => m.remove());
            meteorites = [];
            
            // 生成新迷宫
            maze = generateMaze(level.mazeSize);
            const positions = createMaze3D(maze);
            
            // 设置玩家位置
            player.position.set(
                positions.entrance.x * CONFIG.CELL_SIZE,
                CONFIG.PLAYER_HEIGHT,
                positions.entrance.z * CONFIG.CELL_SIZE
            );
            player.velocity.set(0, 0, 0);
            player.verticalVelocity = 0;
            player.isGrounded = true;
            player.rotation.y = 0;
            player.rotation.x = 0;
            
            // 更新UI
            document.getElementById('levelNum').textContent = levelNum;
            updateLivesUI();
            
            // 重置陨石计时器
            lastMeteorTime = Date.now();
        }
        
        function nextLevel() {
            if (currentLevel >= 16) {
                // 游戏胜利
                gameRunning = false;
                document.getElementById('victoryScreen').style.display = 'flex';
                document.exitPointerLock();
            } else {
                // 显示过渡画面
                document.getElementById('levelTransition').style.display = 'flex';
                document.exitPointerLock();
                gamePaused = true;
                
                setTimeout(() => {
                    document.getElementById('levelTransition').style.display = 'none';
                    gamePaused = false;
                    loadLevel(currentLevel + 1);
                    if (gameRunning) {
                        document.body.requestPointerLock();
                    }
                }, 2000);
            }
        }
        
        function updateLivesUI() {
            const livesEl = document.getElementById('lives');
            livesEl.textContent = '❤️'.repeat(Math.max(0, player.lives));
        }
        
        function playerHit() {
            player.lives--;
            updateLivesUI();
            
            // 显示警告效果
            const warning = document.getElementById('warning');
            warning.classList.add('active');
            setTimeout(() => warning.classList.remove('active'), 300);
            
            if (player.lives <= 0) {
                gameOver();
            }
        }
        
        function gameOver() {
            gameRunning = false;
            document.getElementById('deathLevel').textContent = currentLevel;
            document.getElementById('gameOverScreen').style.display = 'flex';
            document.exitPointerLock();
        }
        
        // ============ 游戏主循环 ============
        let lastTime = 0;
        let walkTime = 0; // 用于头部晃动
        
        function gameLoop(currentTime) {
            requestAnimationFrame(gameLoop);
            
            const deltaTime = Math.min((currentTime - lastTime) / 1000, 0.1); // 限制最大deltaTime
            lastTime = currentTime;
            
            if (!gameRunning || gamePaused) {
                renderer.render(scene, camera);
                return;
            }
            
            // ========== 玩家输入处理 ==========
            let inputX = 0, inputZ = 0;
            
            if (keys['KeyW'] || keys['ArrowUp']) inputZ = -1;
            if (keys['KeyS'] || keys['ArrowDown']) inputZ = 1;
            if (keys['KeyA'] || keys['ArrowLeft']) inputX = -1;
            if (keys['KeyD'] || keys['ArrowRight']) inputX = 1;
            
            // 跳跃输入（空格键）
            if (keys['Space'] && player.isGrounded) {
                player.verticalVelocity = CONFIG.JUMP_FORCE;
                player.isGrounded = false;
                keys['Space'] = false; // 防止按住不放
            }
            
            // ========== 加速度移动 ==========
            const angle = player.rotation.y;
            const isMoving = inputX !== 0 || inputZ !== 0;
            
            if (isMoving) {
                // 计算目标速度方向
                const targetVelX = (Math.sin(angle) * inputZ + Math.cos(angle) * inputX) * CONFIG.MOVE_SPEED;
                const targetVelZ = (Math.cos(angle) * inputZ - Math.sin(angle) * inputX) * CONFIG.MOVE_SPEED;
                
                // 加速度插值
                player.velocity.x += (targetVelX - player.velocity.x) * CONFIG.ACCELERATION * deltaTime;
                player.velocity.z += (targetVelZ - player.velocity.z) * CONFIG.ACCELERATION * deltaTime;
                
                walkTime += deltaTime * 10;
            } else {
                // 摩擦力减速
                player.velocity.x *= (1 - CONFIG.FRICTION * deltaTime);
                player.velocity.z *= (1 - CONFIG.FRICTION * deltaTime);
                
                // 速度很小时归零
                if (Math.abs(player.velocity.x) < 0.01) player.velocity.x = 0;
                if (Math.abs(player.velocity.z) < 0.01) player.velocity.z = 0;
            }
            
            // 应用水平移动
            const newX = player.position.x + player.velocity.x * deltaTime;
            const newZ = player.position.z + player.velocity.z * deltaTime;
            
            // 分别检测X和Z方向的碰撞
            if (!checkWallCollision(newX, player.position.z)) {
                player.position.x = newX;
            } else {
                player.velocity.x = 0; // 撞墙停止
            }
            if (!checkWallCollision(player.position.x, newZ)) {
                player.position.z = newZ;
            } else {
                player.velocity.z = 0; // 撞墙停止
            }
            
            // ========== 重力和跳跃 ==========
            if (!player.isGrounded) {
                player.verticalVelocity -= CONFIG.GRAVITY * deltaTime;
            }
            
            // 应用垂直移动
            player.position.y += player.verticalVelocity * deltaTime;
            
            // 检测地面
            if (player.position.y <= CONFIG.PLAYER_HEIGHT) {
                player.position.y = CONFIG.PLAYER_HEIGHT;
                player.verticalVelocity = 0;
                player.isGrounded = true;
            }
            
            // ========== 检测陷阱 ==========
            if (checkTrapCollision()) {
                playerHit();
                // 将玩家弹开
                player.velocity.x *= -0.5;
                player.velocity.z *= -0.5;
            }
            
            // ========== 更新相机 ==========
            // 使用Euler角正确设置相机旋转，避免倾斜
            camera.position.copy(player.position);
            
            // 头部晃动效果（仅在地面时）
            if (isMoving && player.isGrounded) {
                const bobAmount = 0.06;
                const bobSpeed = walkTime;
                camera.position.y += Math.sin(bobSpeed) * bobAmount;
            }
            
            // 正确设置相机旋转（YXZ顺序，避免倾斜）
            camera.rotation.set(0, 0, 0);
            camera.rotateY(player.rotation.y);
            camera.rotateX(player.rotation.x);
            
            // 生成陨石
            const level = LEVELS[currentLevel - 1];
            if (Date.now() - lastMeteorTime > level.meteorInterval) {
                lastMeteorTime = Date.now();
                if (meteorites.length < level.meteorites) {
                    spawnMeteorite();
                }
            }
            
            // 更新陨石
            for (let i = meteorites.length - 1; i >= 0; i--) {
                const hit = meteorites[i].update(deltaTime, player.position);
                if (hit) {
                    playerHit();
                    meteorites[i].remove();
                    meteorites.splice(i, 1);
                } else if (meteorites[i].hit) {
                    meteorites.splice(i, 1);
                }
            }
            
            // 检查是否到达出口
            if (checkExit()) {
                nextLevel();
            }
            
            // 出口动画
            if (exitMarker) {
                exitMarker.rotation.y += 0.02;
            }
            
            renderer.render(scene, camera);
        }
        
        // ============ 开始游戏 ============
        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('victoryScreen').style.display = 'none';
            document.getElementById('gameOverScreen').style.display = 'none';
            
            player.lives = 3;
            currentLevel = 1;
            gameRunning = true;
            gamePaused = false;
            
            loadLevel(1);
            document.body.requestPointerLock();
        }
        
        function restartGame() {
            document.getElementById('gameOverScreen').style.display = 'none';
            player.lives = 3;
            currentLevel = 1;
            gameRunning = true;
            gamePaused = false;
            
            loadLevel(1);
            document.body.requestPointerLock();
        }
        
        // ============ 初始化 ============
        function init() {
            initThreeJS();
            
            // 事件绑定
            document.getElementById('startBtn').addEventListener('click', startGame);
            document.getElementById('restartBtn').addEventListener('click', restartGame);
            document.getElementById('playAgainBtn').addEventListener('click', startGame);
            
            // 开始渲染循环
            requestAnimationFrame(gameLoop);
        }
        
        // 页面加载完成后初始化
        window.addEventListener('load', init);
    </script>
</body>
