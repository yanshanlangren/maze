<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D迷宫逃脱</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; font-family: Arial, sans-serif; }
        #gameCanvas { display: block; }
        
        #ui {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
        }
        
        .stat-box {
            position: absolute;
            top: 20px; left: 20px;
            background: rgba(0,0,0,0.7);
            color: #fff;
            padding: 10px 15px;
            border-radius: 5px;
            font-size: 16px;
        }
        
        #minimap {
            position: absolute;
            top: 80px; left: 20px;
            background: rgba(0,0,0,0.8);
            border: 2px solid #444;
        }
        
        .crosshair {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 20px; height: 20px;
        }
        .crosshair::before, .crosshair::after {
            content: '';
            position: absolute;
            background: rgba(255,255,255,0.7);
        }
        .crosshair::before { width: 2px; height: 20px; left: 9px; }
        .crosshair::after { width: 20px; height: 2px; top: 9px; }
        
        .hint {
            position: absolute;
            bottom: 20px; left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: #aaa;
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 14px;
        }
        
        #startScreen, #winScreen {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.9);
            z-index: 100;
        }
        
        #winScreen { display: none; }
        
        h1 { color: #ffd700; font-size: 3rem; margin-bottom: 20px; }
        p { color: #aaa; margin-bottom: 30px; }
        
        button {
            background: #ffd700;
            color: #000;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            border-radius: 30px;
            cursor: pointer;
            pointer-events: auto;
        }
        button:hover { background: #ffaa00; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div id="ui">
        <div class="stat-box">
            <span style="color:#ffd700">关卡: <span id="level">1</span></span> | 
            <span style="color:#ff6b6b">生命: <span id="lives">❤️❤️❤️</span></span>
        </div>
        <canvas id="minimap" width="160" height="160"></canvas>
        <div class="crosshair"></div>
        <div class="hint">WASD移动 | 空格跳跃 | 鼠标转向 | 到达金色出口过关</div>
    </div>
    
    <div id="startScreen">
        <h1>🎮 3D迷宫逃脱</h1>
        <p>探索迷宫，找到金色出口！</p>
        <button id="startBtn">开始游戏</button>
    </div>
    
    <div id="winScreen">
        <h1>🏆 恭喜通关！</h1>
        <p>你成功逃出了迷宫！</p>
        <button id="replayBtn">再玩一次</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // 配置
        const CONFIG = {
            MAZE_SIZE: 32,
            CELL_SIZE: 4,
            WALL_HEIGHT: 4,
            PLAYER_HEIGHT: 1.6,
            PLAYER_RADIUS: 0.4,
            MOVE_SPEED: 6,
            JUMP_FORCE: 8,
            GRAVITY: 20,
        };

        // 全局变量
        let scene, camera, renderer, minimapCtx;
        let maze = [];
        let player = {
            pos: new THREE.Vector3(),
            vel: new THREE.Vector3(),
            rotY: 0,
            rotX: 0,
            grounded: true,
            lives: 3
        };
        let keys = {};
        let level = 1;
        let running = false;

        // 初始化Three.js
        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a2e);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 500);
            
            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('gameCanvas'), antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            
            minimapCtx = document.getElementById('minimap').getContext('2d');

            // 光照
            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(50, 100, 50);
            scene.add(dirLight);

            // 事件
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
            
            document.addEventListener('keydown', e => keys[e.code] = true);
            document.addEventListener('keyup', e => keys[e.code] = false);
            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('click', () => {
                if (running) document.body.requestPointerLock();
            });

            document.getElementById('startBtn').onclick = startGame;
            document.getElementById('replayBtn').onclick = startGame;

            animate();
        }

        function onMouseMove(e) {
            if (document.pointerLockElement !== document.body || !running) return;
            player.rotY -= e.movementX * 0.002;
            player.rotX -= e.movementY * 0.002;
            player.rotX = Math.max(-Math.PI/4, Math.min(Math.PI/4, player.rotX));
        }

        // 迷宫生成 (DFS)
        function generateMaze(size) {
            // 初始化全为墙
            const m = Array(size).fill(null).map(() => Array(size).fill(1));
            
            // DFS挖通道
            const stack = [[1, 1]];
            m[1][1] = 0;
            
            while (stack.length > 0) {
                const [cx, cy] = stack[stack.length - 1];
                const dirs = [[0,2],[2,0],[0,-2],[-2,0]];
                const neighbors = [];
                
                for (const [dx, dy] of dirs) {
                    const nx = cx + dx, ny = cy + dy;
                    if (nx > 0 && nx < size-1 && ny > 0 && ny < size-1 && m[ny][nx] === 1) {
                        neighbors.push([nx, ny, dx/2, dy/2]);
                    }
                }
                
                if (neighbors.length > 0) {
                    const [nx, ny, dx, dy] = neighbors[Math.floor(Math.random() * neighbors.length)];
                    m[cy + dy][cx + dx] = 0;
                    m[ny][nx] = 0;
                    stack.push([nx, ny]);
                } else {
                    stack.pop();
                }
            }

            // 确保入口出口区域畅通
            for (let y = 1; y <= 3; y++) {
                for (let x = 1; x <= 3; x++) {
                    m[y][x] = 0;
                }
            }
            for (let y = size-4; y <= size-2; y++) {
                for (let x = size-4; x <= size-2; x++) {
                    m[y][x] = 0;
                }
            }

            return m;
        }

        // 创建3D迷宫
        function createMaze() {
            // 清除旧场景
            while (scene.children.length > 2) {
                scene.remove(scene.children[scene.children.length - 1]);
            }

            const size = CONFIG.MAZE_SIZE;
            const cs = CONFIG.CELL_SIZE;
            const wh = CONFIG.WALL_HEIGHT;

            // 地板
            const floorGeo = new THREE.PlaneGeometry(size * cs, size * cs);
            const floorMat = new THREE.MeshStandardMaterial({ color: 0x3a3a4a });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            floor.position.set(size * cs / 2, 0, size * cs / 2);
            scene.add(floor);

            // 天花板
            const ceilMat = new THREE.MeshStandardMaterial({ 
                color: 0x2a2a3a, 
                transparent: true, 
                opacity: 0.5,
                side: THREE.DoubleSide 
            });
            const ceiling = new THREE.Mesh(floorGeo, ceilMat);
            ceiling.rotation.x = Math.PI / 2;
            ceiling.position.set(size * cs / 2, wh, size * cs / 2);
            scene.add(ceiling);

            // 墙壁材质
            const wallMat = new THREE.MeshStandardMaterial({ color: 0x5a5a6a });
            const wallGeo = new THREE.BoxGeometry(cs, wh, cs);

            // 边界墙
            const boundaryMat = new THREE.MeshStandardMaterial({ color: 0x4a4a5a });
            
            // 外围四墙（完全封闭）
            const northWall = new THREE.Mesh(new THREE.BoxGeometry(size * cs, wh, cs), boundaryMat);
            northWall.position.set(size * cs / 2, wh / 2, -cs / 2);
            scene.add(northWall);
            
            const southWall = new THREE.Mesh(new THREE.BoxGeometry(size * cs, wh, cs), boundaryMat);
            southWall.position.set(size * cs / 2, wh / 2, size * cs - cs / 2);
            scene.add(southWall);
            
            const westWall = new THREE.Mesh(new THREE.BoxGeometry(cs, wh, size * cs), boundaryMat);
            westWall.position.set(-cs / 2, wh / 2, size * cs / 2);
            scene.add(westWall);
            
            const eastWall = new THREE.Mesh(new THREE.BoxGeometry(cs, wh, size * cs), boundaryMat);
            eastWall.position.set(size * cs - cs / 2, wh / 2, size * cs / 2);
            scene.add(eastWall);

            // 内部墙壁
            for (let y = 0; y < size; y++) {
                for (let x = 0; x < size; x++) {
                    if (maze[y][x] === 1) {
                        const wall = new THREE.Mesh(wallGeo, wallMat);
                        wall.position.set(x * cs + cs/2, wh / 2, y * cs + cs/2);
                        scene.add(wall);
                    }
                }
            }

            // 入口标记（绿色）
            const entranceMat = new THREE.MeshStandardMaterial({ 
                color: 0x00ff00, 
                emissive: 0x00ff00, 
                emissiveIntensity: 0.5 
            });
            const entrance = new THREE.Mesh(new THREE.BoxGeometry(cs, 0.1, cs), entranceMat);
            entrance.position.set(2 * cs + cs/2, 0.1, 2 * cs + cs/2);
            scene.add(entrance);

            // 入口灯光
            const entranceLight = new THREE.PointLight(0x00ff00, 2, 20);
            entranceLight.position.set(2 * cs + cs/2, 2, 2 * cs + cs/2);
            scene.add(entranceLight);

            // 出口标记（金色）
            const exitMat = new THREE.MeshStandardMaterial({ 
                color: 0xffd700, 
                emissive: 0xffd700, 
                emissiveIntensity: 0.8 
            });
            const exitMarker = new THREE.Mesh(new THREE.BoxGeometry(cs, 0.1, cs), exitMat);
            exitMarker.position.set((size - 2) * cs + cs/2, 0.1, (size - 2) * cs + cs/2);
            exitMarker.name = 'exit';
            scene.add(exitMarker);

            // 出口灯光
            const exitLight = new THREE.PointLight(0xffd700, 3, 30);
            exitLight.position.set((size - 2) * cs + cs/2, 2, (size - 2) * cs + cs/2);
            scene.add(exitLight);

            // 出口光柱
            const beamGeo = new THREE.CylinderGeometry(1, 1, wh, 16);
            const beamMat = new THREE.MeshBasicMaterial({ color: 0xffd700, transparent: true, opacity: 0.2 });
            const beam = new THREE.Mesh(beamGeo, beamMat);
            beam.position.set((size - 2) * cs + cs/2, wh / 2, (size - 2) * cs + cs/2);
            scene.add(beam);

            // 玩家头顶灯
            const playerLight = new THREE.PointLight(0xffffff, 0.8, 15);
            playerLight.name = 'playerLight';
            scene.add(playerLight);
        }

        // 碰撞检测
        function isWall(x, z) {
            const size = CONFIG.MAZE_SIZE;
            const cs = CONFIG.CELL_SIZE;
            
            // 转换为格子索引
            const gx = Math.floor(x / cs);
            const gz = Math.floor(z / cs);
            
            // 边界检查
            if (gx < 0 || gx >= size || gz < 0 || gz >= size) return true;
            
            return maze[gz][gx] === 1;
        }

        function canMove(newX, newZ) {
            const r = CONFIG.PLAYER_RADIUS;
            // 检查四个角
            return !isWall(newX - r, newZ - r) &&
                   !isWall(newX + r, newZ - r) &&
                   !isWall(newX - r, newZ + r) &&
                   !isWall(newX + r, newZ + r);
        }

        // 检查是否到达出口
        function checkWin() {
            const size = CONFIG.MAZE_SIZE;
            const cs = CONFIG.CELL_SIZE;
            const exitX = (size - 2) * cs + cs / 2;
            const exitZ = (size - 2) * cs + cs / 2;
            
            const dx = player.pos.x - exitX;
            const dz = player.pos.z - exitZ;
            
            return Math.sqrt(dx * dx + dz * dz) < cs;
        }

        // 更新小地图
        function updateMinimap() {
            const ctx = minimapCtx;
            const canvas = ctx.canvas;
            const size = CONFIG.MAZE_SIZE;
            const cs = CONFIG.CELL_SIZE;
            
            // 玩家位置（格子索引）
            const px = Math.floor(player.pos.x / cs);
            const pz = Math.floor(player.pos.z / cs);
            const range = 8;
            
            ctx.fillStyle = '#111';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            const cellPx = canvas.width / (range * 2 + 1);
            
            for (let dz = -range; dz <= range; dz++) {
                for (let dx = -range; dx <= range; dx++) {
                    const mx = px + dx;
                    const mz = pz + dz;
                    const sx = (dx + range) * cellPx;
                    const sy = (dz + range) * cellPx;
                    
                    if (mx < 0 || mx >= size || mz < 0 || mz >= size) {
                        ctx.fillStyle = '#000';
                    } else if (maze[mz][mx] === 1) {
                        ctx.fillStyle = '#555';
                    } else {
                        ctx.fillStyle = '#888';
                    }
                    ctx.fillRect(sx, sy, cellPx, cellPx);
                }
            }
            
            // 出口
            const exitX = size - 2;
            const exitZ = size - 2;
            const edx = exitX - px;
            const edz = exitZ - pz;
            if (Math.abs(edx) <= range && Math.abs(edz) <= range) {
                ctx.fillStyle = '#ffd700';
                ctx.fillRect((edx + range) * cellPx, (edz + range) * cellPx, cellPx, cellPx);
            }
            
            // 玩家
            ctx.fillStyle = '#00ff00';
            ctx.beginPath();
            ctx.arc(canvas.width / 2, canvas.height / 2, cellPx / 2, 0, Math.PI * 2);
            ctx.fill();
        }

        // 游戏主循环
        function animate(time = 0) {
            requestAnimationFrame(animate);
            
            const dt = 0.016; // 固定时间步长

            if (!running) {
                renderer.render(scene, camera);
                return;
            }

            // 输入
            let moveX = 0, moveZ = 0;
            if (keys['KeyW'] || keys['ArrowUp']) moveZ = -1;
            if (keys['KeyS'] || keys['ArrowDown']) moveZ = 1;
            if (keys['KeyA'] || keys['ArrowLeft']) moveX = -1;
            if (keys['KeyD'] || keys['ArrowRight']) moveX = 1;

            // 跳跃
            if (keys['Space'] && player.grounded) {
                player.vel.y = CONFIG.JUMP_FORCE;
                player.grounded = false;
                keys['Space'] = false;
            }

            // 移动方向（相对于玩家朝向）
            const speed = CONFIG.MOVE_SPEED;
            const angle = player.rotY;
            
            const vx = (Math.sin(angle) * moveZ + Math.cos(angle) * moveX) * speed;
            const vz = (Math.cos(angle) * moveZ - Math.sin(angle) * moveX) * speed;

            // 尝试移动（分轴检测）
            const newX = player.pos.x + vx * dt;
            const newZ = player.pos.z + vz * dt;

            if (canMove(newX, player.pos.z)) {
                player.pos.x = newX;
            }
            if (canMove(player.pos.x, newZ)) {
                player.pos.z = newZ;
            }

            // 重力
            if (!player.grounded) {
                player.vel.y -= CONFIG.GRAVITY * dt;
            }
            player.pos.y += player.vel.y * dt;

            if (player.pos.y <= CONFIG.PLAYER_HEIGHT) {
                player.pos.y = CONFIG.PLAYER_HEIGHT;
                player.vel.y = 0;
                player.grounded = true;
            }

            // 更新相机
            camera.position.copy(player.pos);
            camera.rotation.set(0, 0, 0);
            camera.rotateY(player.rotY);
            camera.rotateX(player.rotX);

            // 更新玩家灯光
            const pl = scene.getObjectByName('playerLight');
            if (pl) {
                pl.position.copy(player.pos);
                pl.position.y += 2;
            }

            // 检查胜利
            if (checkWin()) {
                level++;
                if (level > 16) {
                    running = false;
                    document.getElementById('winScreen').style.display = 'flex';
                    document.exitPointerLock();
                } else {
                    loadLevel();
                }
            }

            // 更新UI
            document.getElementById('level').textContent = level;
            updateMinimap();

            renderer.render(scene, camera);
        }

        // 加载关卡
        function loadLevel() {
            maze = generateMaze(CONFIG.MAZE_SIZE);
            createMaze();

            // 重置玩家位置
            const cs = CONFIG.CELL_SIZE;
            player.pos.set(2 * cs + cs / 2, CONFIG.PLAYER_HEIGHT, 2 * cs + cs / 2);
            player.vel.set(0, 0, 0);
            player.rotY = 0;
            player.rotX = 0;
            player.grounded = true;

            document.getElementById('level').textContent = level;
            updateLives();
        }

        function updateLives() {
            document.getElementById('lives').textContent = '❤️'.repeat(player.lives);
        }

        // 开始游戏
        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('winScreen').style.display = 'none';
            
            level = 1;
            player.lives = 3;
            running = true;
            
            loadLevel();
            document.body.requestPointerLock();
        }

        // 启动
        window.addEventListener('load', init);
    </script>
</body>
</html>
