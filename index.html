<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D迷宫逃脱 - 多人版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; font-family: Arial, sans-serif; }
        #gameCanvas { display: block; }
        
        #ui {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
        }
        
        .stat-box {
            position: absolute;
            top: 20px; left: 20px;
            background: rgba(0,0,0,0.8);
            color: #fff;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 16px;
        }
        
        .room-info {
            position: absolute;
            top: 20px; right: 20px;
            background: rgba(0,0,0,0.8);
            color: #fff;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 14px;
        }
        
        .connection-status {
            display: inline-block;
            width: 10px; height: 10px;
            border-radius: 50%;
            margin-right: 8px;
        }
        .connection-status.connected { background: #00ff00; }
        .connection-status.connecting { background: #ffaa00; animation: blink 1s infinite; }
        .connection-status.disconnected { background: #ff0000; }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        #minimapContainer {
            position: absolute;
            top: 80px; left: 20px;
            background: rgba(0,0,0,0.9);
            border-radius: 8px;
            padding: 10px;
            border: 2px solid #444;
        }
        
        #minimapTitle { color: #aaa; font-size: 12px; margin-bottom: 5px; text-align: center; }
        #minimap { display: block; }
        
        .crosshair {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 20px; height: 20px;
        }
        .crosshair::before, .crosshair::after {
            content: '';
            position: absolute;
            background: rgba(255,255,255,0.7);
        }
        .crosshair::before { width: 2px; height: 20px; left: 9px; }
        .crosshair::after { width: 20px; height: 2px; top: 9px; }
        .crosshair.attacking {
            animation: crosshairKick 0.22s ease-out;
        }

        #attackEffect {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            border: 2px solid rgba(255, 235, 180, 0.85);
            box-shadow: 0 0 18px rgba(255, 180, 100, 0.55);
            transform: translate(-50%, -50%) scale(0.5);
            opacity: 0;
            pointer-events: none;
        }
        #attackEffect.active {
            animation: attackFlash 0.22s ease-out;
        }

        @keyframes crosshairKick {
            0% { transform: translate(-50%, -50%) scale(1); }
            30% { transform: translate(-50%, -50%) scale(1.35); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }
        @keyframes attackFlash {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0.85; }
            100% { transform: translate(-50%, -50%) scale(2.3); opacity: 0; }
        }
        
        .hint {
            position: absolute;
            bottom: 20px; left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: #aaa;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
        }
        
        .warning {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            background: radial-gradient(ellipse at center, transparent 50%, rgba(255,0,0,0.4) 100%);
            opacity: 0;
            transition: opacity 0.1s;
        }
        .warning.active { opacity: 1; }
        
        #startScreen, #winScreen, #gameOver, #waitingScreen {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.95);
            z-index: 100;
        }
        
        #winScreen, #gameOver, #waitingScreen { display: none; }
        
        h1 { color: #ffd700; font-size: 3rem; margin-bottom: 15px; }
        .subtitle { color: #ff6b6b; font-size: 1.2rem; margin-bottom: 20px; }
        .instructions { color: #888; text-align: center; margin-top: 30px; line-height: 2; }
        
        button {
            background: linear-gradient(45deg, #ffd700, #ffaa00);
            color: #000;
            border: none;
            padding: 18px 50px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            pointer-events: auto;
            margin: 10px;
        }
        button:hover { transform: scale(1.05); }
        button:disabled { 
            background: #666; 
            color: #999; 
            cursor: not-allowed;
            transform: none;
        }
        
        .restart-btn {
            background: linear-gradient(45deg, #ff6b6b, #ff8e8e);
            color: #fff;
            margin-top: 20px;
        }
        
        .player-indicator {
            position: absolute;
            padding: 5px 10px;
            background: rgba(0,0,0,0.7);
            color: #fff;
            font-size: 12px;
            border-radius: 4px;
            white-space: nowrap;
            pointer-events: none;
        }
        
        #levelCompletePopup {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            color: #ffd700;
            padding: 30px 50px;
            border-radius: 15px;
            font-size: 1.5rem;
            text-align: center;
            display: none;
            z-index: 50;
            border: 2px solid #ffd700;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div id="ui">
        <div class="stat-box">
            <span style="color:#ffd700">关卡: <span id="level">1</span>/16</span> | 
            <span style="color:#ff6b6b">生命: <span id="lives">❤️❤️❤️</span></span> |
            <span style="color:#9370db">僵尸: <span id="zombieCount">0</span></span>
        </div>
        
        <div class="room-info">
            <span class="connection-status" id="connStatus"></span>
            <span id="roomInfo">未连接</span>
        </div>
        
        <div id="minimapContainer">
            <div id="minimapTitle">小地图</div>
            <canvas id="minimap" width="160" height="160"></canvas>
        </div>
        
        <div class="crosshair"></div>
        <div id="attackEffect"></div>
        <div class="warning" id="warning"></div>
        
        <div class="hint">
            WASD 移动 | 空格 跳跃 | 鼠标 转向 | 左键 攻击僵尸
        </div>
    </div>
    
    <div id="startScreen">
        <h1>3D迷宫逃脱</h1>
        <p class="subtitle">多人合作版 - 2人一房，一人通关全队胜利！</p>
        <button id="startBtn">加入游戏</button>
        <div class="instructions">
            <p>WASD 移动 | 空格 跳跃 | 鼠标 转向 | 左键 攻击</p>
            <p><span style="color:#00ff00">绿色</span> 起点 | <span style="color:#ffd700">金色</span> 终点 | <span style="color:#ff0000">红色</span> 陷阱 | <span style="color:#9370db">紫色</span> 僵尸</p>
            <p style="color:#00aaff">蓝色圆圈 = 其他玩家</p>
        </div>
    </div>
    
    <div id="waitingScreen">
        <h1 style="color:#00aaff">等待其他玩家...</h1>
        <p class="subtitle">房间: <span id="waitingRoomId">-</span></p>
        <p style="color:#888;margin-top:20px">当前玩家: <span id="playerCount">1</span>/2</p>
        <p style="color:#666;margin-top:10px;font-size:14px">游戏将在2人加入后自动开始</p>
    </div>
    
    <div id="gameOver">
        <h1 style="color:#ff6b6b">游戏结束</h1>
        <p style="color:#aaa;margin:20px 0">你在第 <span id="deathLevel">1</span> 关倒下了...</p>
        <button class="restart-btn" id="restartBtn">重新开始</button>
    </div>
    
    <div id="winScreen">
        <h1>恭喜通关！</h1>
        <p style="color:#ffd700;font-size:1.3rem;margin-bottom:30px">你和队友成功通过了所有16关！</p>
        <button id="replayBtn">再玩一次</button>
    </div>
    
    <div id="levelCompletePopup">
        <div id="popupText">队友已到达终点！</div>
        <div style="font-size:1rem;color:#aaa;margin-top:10px">正在进入下一关...</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // ========== 配置 ==========
        const CELL_SIZE = 4;
        const MAZE_SIZE = 32;
        const WALL_HEIGHT = 4;
        const PLAYER_HEIGHT = 1.6;
        const PLAYER_RADIUS = 0.35;
        const MOVE_SPEED = 35;
        const MOVE_ACCEL = 50;
        const GROUND_DRAG = 8;
        const AIR_ACCEL_FACTOR = 1;
        const AIR_DRAG = 8;
        const ATTACK_COOLDOWN_MS = 650;
        const ATTACK_ANIM_MS = 220;
        const JUMP_FORCE = 10;
        const GRAVITY = 25;
        const TRAP_SIZE = CELL_SIZE * 0.45;
        const SYNC_INTERVAL = 50; // 同步间隔(ms)

        // ========== 全局变量 ==========
        let scene, camera, renderer, minimapCtx;
        let maze = [];
        let player = {
            x: 0, y: PLAYER_HEIGHT, z: 0,
            vx: 0, vy: 0, vz: 0,
            rotY: 0, rotX: 0,
            grounded: true,
            lives: 3,
            lastDamageTime: 0
        };
        let keys = {};
        let level = 1;
        let running = false;
        let traps = [];
        let zombies = [];
        let exitX = 0, exitZ = 0;
        let sword = null;
        let swordSwinging = false;
        let swordSwingTime = 0;
        let lastAttackTime = -Infinity;
        let attackAnimTimer = 0;
        let lastTime = 0;
        let mazeSeed = 0;

        // ========== 多人游戏变量 ==========
        let ws = null;
        let playerId = null;
        let roomId = null;
        let isHost = false;
        let otherPlayers = {};  // 其他玩家 {playerId: {mesh, x, y, z, rotY}}
        let connected = false;
        let lastSyncTime = 0;

        // ========== WebSocket 连接 ==========
        function connectToServer() {
            // 根据页面协议自动选择 ws:// 或 wss://
            const wsProtocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${wsProtocol}//${location.host}/ws`;
            updateConnectionStatus('connecting');
            
            try {
                ws = new WebSocket(wsUrl);
                
                ws.onopen = () => {
                    console.log('[WS] 已连接到服务器');
                    updateConnectionStatus('connected');
                    connected = true;
                    // 发送加入请求
                    ws.send(JSON.stringify({ type: 'join' }));
                };
                
                ws.onmessage = (event) => {
                    try {
                        const data = JSON.parse(event.data);
                        handleServerMessage(data);
                    } catch (e) {
                        console.error('[WS] 解析消息失败:', e);
                    }
                };
                
                ws.onclose = () => {
                    console.log('[WS] 连接关闭');
                    updateConnectionStatus('disconnected');
                    connected = false;
                };
                
                ws.onerror = (error) => {
                    console.error('[WS] 连接错误:', error);
                    updateConnectionStatus('disconnected');
                };
            } catch (e) {
                console.error('[WS] 创建连接失败:', e);
                updateConnectionStatus('disconnected');
            }
        }

        function updateConnectionStatus(status) {
            const el = document.getElementById('connStatus');
            if (el) {
                el.className = 'connection-status ' + status;
            }
        }

        function handleServerMessage(data) {
            switch (data.type) {
                case 'joined':
                    playerId = data.player_id;
                    roomId = data.room_id;
                    mazeSeed = data.maze_seed;
                    level = data.level;
                    isHost = data.is_host;
                    
                    document.getElementById('roomInfo').textContent = `房间: ${roomId} ${isHost ? '(房主)' : ''}`;
                    console.log(`[WS] 已加入房间 ${roomId}, 玩家ID: ${playerId}`);
                    
                    // 添加已有的其他玩家
                    for (const [pid, pdata] of Object.entries(data.players)) {
                        if (pid !== playerId) {
                            createOtherPlayer(pid, pdata);
                        }
                    }
                    
                    // 直接开始游戏，不需要等待
                    document.getElementById('playerCount').textContent = Object.keys(otherPlayers).length + 1;
                    startGame();
                    break;
                    
                case 'player_joined':
                    console.log(`[WS] 玩家 ${data.player_id} 加入房间`);
                    createOtherPlayer(data.player_id, data);
                    document.getElementById('playerCount').textContent = Object.keys(otherPlayers).length + 1;
                    break;
                    
                case 'player_left':
                    console.log(`[WS] 玩家 ${data.player_id} 离开房间`);
                    removeOtherPlayer(data.player_id);
                    document.getElementById('playerCount').textContent = Object.keys(otherPlayers).length + 1;
                    break;
                    
                case 'game_start':
                    console.log('[WS] 游戏开始');
                    break;
                    
                case 'player_update':
                    updateOtherPlayer(data.player_id, data);
                    break;
                    
                case 'player_attack':
                    // 显示其他玩家攻击效果
                    showOtherPlayerAttack(data.player_id);
                    break;
                    
                case 'level_complete':
                    handleLevelComplete(data);
                    break;
                    
                case 'next_level_start':
                    handleNextLevel(data);
                    break;
                    
                case 'player_hit':
                    // 其他玩家受伤
                    if (data.player_id !== playerId) {
                        console.log(`[WS] 玩家 ${data.player_id} 受伤, 生命: ${data.lives}`);
                    }
                    break;
                    
                case 'game_over':
                    if (data.player_id !== playerId) {
                        // 显示队友死亡信息
                        console.log(`[WS] 队友 ${data.player_id} 游戏结束`);
                    }
                    break;
            }
        }

        function sendMessage(data) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify(data));
            }
        }

        // ========== 其他玩家管理 ==========
        function createOtherPlayer(pid, data) {
            if (otherPlayers[pid]) return;
            
            // 创建其他玩家的3D模型（简单圆柱体+球体）
            const group = new THREE.Group();
            
            // 身体
            const bodyGeo = new THREE.CylinderGeometry(0.3, 0.3, 1.4, 8);
            const bodyMat = new THREE.MeshStandardMaterial({ 
                color: 0x00aaff, 
                emissive: 0x0066aa,
                emissiveIntensity: 0.3
            });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.position.y = 0.7;
            group.add(body);
            
            // 头部
            const headGeo = new THREE.SphereGeometry(0.25, 8, 8);
            const head = new THREE.Mesh(headGeo, bodyMat);
            head.position.y = 1.6;
            group.add(head);
            
            // 设置位置
            group.position.set(data.x || 14, data.y || PLAYER_HEIGHT, data.z || 14);
            if (data.rot_y !== undefined) {
                group.rotation.y = data.rot_y;
            }
            
            scene.add(group);
            
            otherPlayers[pid] = {
                mesh: group,
                x: data.x || 14,
                y: data.y || PLAYER_HEIGHT,
                z: data.z || 14,
                rotY: data.rot_y || 0
            };
            
            console.log(`[Player] 创建其他玩家模型: ${pid}`);
        }

        function updateOtherPlayer(pid, data) {
            const op = otherPlayers[pid];
            if (!op) {
                createOtherPlayer(pid, data);
                return;
            }
            
            // 平滑移动
            op.x = data.x;
            op.y = data.y;
            op.z = data.z;
            op.rotY = data.rot_y;
        }

        function removeOtherPlayer(pid) {
            if (otherPlayers[pid]) {
                scene.remove(otherPlayers[pid].mesh);
                delete otherPlayers[pid];
            }
        }

        function showOtherPlayerAttack(pid) {
            // 可以添加其他玩家的攻击视觉效果
        }

        function updateOtherPlayersVisual(dt) {
            for (const [pid, op] of Object.entries(otherPlayers)) {
                if (op.mesh) {
                    // 平滑插值
                    op.mesh.position.x += (op.x - op.mesh.position.x) * 10 * dt;
                    op.mesh.position.y += (op.y - op.mesh.position.y) * 10 * dt;
                    op.mesh.position.z += (op.z - op.mesh.position.z) * 10 * dt;
                    
                    // 平滑旋转
                    let rotDiff = op.rotY - op.mesh.rotation.y;
                    while (rotDiff > Math.PI) rotDiff -= Math.PI * 2;
                    while (rotDiff < -Math.PI) rotDiff += Math.PI * 2;
                    op.mesh.rotation.y += rotDiff * 10 * dt;
                }
            }
        }

        // ========== 通关处理 ==========
        function handleLevelComplete(data) {
            const popup = document.getElementById('levelCompletePopup');
            const text = document.getElementById('popupText');
            
            if (data.winner_id === playerId) {
                text.textContent = '恭喜！你到达了终点！';
            } else {
                text.textContent = '队友已到达终点！';
            }
            
            popup.style.display = 'block';
            
            // 准备下一关
            level = data.next_level;
        }

        function handleNextLevel(data) {
            document.getElementById('levelCompletePopup').style.display = 'none';
            level = data.level;
            mazeSeed = data.maze_seed;
            
            // 重置玩家位置
            const spawnPos = gridToWorld(3, 3);
            player.x = spawnPos.x;
            player.y = PLAYER_HEIGHT;
            player.z = spawnPos.z;
            player.vx = player.vy = player.vz = 0;
            player.rotY = Math.PI * 0.75;
            player.rotX = 0;
            player.grounded = true;
            player.lastDamageTime = 0;
            lastAttackTime = -Infinity;
            
            // 重新生成关卡
            generateMaze();
            createScene();
            generateZombies();
            
            document.getElementById('level').textContent = level;
            updateLivesUI();
            
            // 通知服务器已准备好
            if (!isHost) {
                // 非房主等待房主发送next_level
            }
        }

        // ========== 创建剑模型 ==========
        function createSword() {
            const swordGroup = new THREE.Group();
            
            const bladeLength = 1.2;
            const bladeWidth = 0.08;
            const bladeThickness = 0.03;
            const bladeGeo = new THREE.BoxGeometry(bladeThickness, bladeLength, bladeWidth);
            const bladeMat = new THREE.MeshStandardMaterial({ 
                color: 0xcccccc, 
                metalness: 0.9, 
                roughness: 0.2,
                emissive: 0x222222,
                emissiveIntensity: 0.3
            });
            const blade = new THREE.Mesh(bladeGeo, bladeMat);
            blade.position.set(0, bladeLength / 2, 0);
            swordGroup.add(blade);
            
            const tipGeo = new THREE.ConeGeometry(bladeWidth * 0.8, 0.2, 4);
            const tip = new THREE.Mesh(tipGeo, bladeMat);
            tip.position.set(0, bladeLength + 0.1, 0);
            swordGroup.add(tip);
            
            const guardGeo = new THREE.BoxGeometry(0.25, 0.06, 0.1);
            const guardMat = new THREE.MeshStandardMaterial({ 
                color: 0xffd700, 
                metalness: 0.6, 
                roughness: 0.4 
            });
            const guard = new THREE.Mesh(guardGeo, guardMat);
            guard.position.set(0, -0.03, 0);
            swordGroup.add(guard);
            
            const handleGeo = new THREE.CylinderGeometry(0.025, 0.025, 0.18, 8);
            const handleMat = new THREE.MeshStandardMaterial({ 
                color: 0x4a3728, 
                roughness: 0.9 
            });
            const handle = new THREE.Mesh(handleGeo, handleMat);
            handle.position.set(0, -0.12, 0);
            swordGroup.add(handle);
            
            const pommelGeo = new THREE.SphereGeometry(0.04, 8, 8);
            const pommelMat = new THREE.MeshStandardMaterial({ 
                color: 0xffd700, 
                metalness: 0.8, 
                roughness: 0.3 
            });
            const pommel = new THREE.Mesh(pommelGeo, pommelMat);
            pommel.position.set(0, -0.22, 0);
            swordGroup.add(pommel);
            
            swordGroup.userData.basePos = { x: 0.5, y: -0.3, z: -0.8 };
            swordGroup.userData.baseRot = { x: -0.2, y: 0.4, z: -0.7 };
            
            return swordGroup;
        }

        function updateSwordPosition() {
            if (!sword) return;
            
            if (!running) {
                sword.visible = false;
                return;
            }
            
            sword.visible = true;
            
            const forward = new THREE.Vector3(0, 0, -1);
            forward.applyQuaternion(camera.quaternion);
            
            const right = new THREE.Vector3(1, 0, 0);
            right.applyQuaternion(camera.quaternion);
            
            const up = new THREE.Vector3(0, 1, 0);
            up.applyQuaternion(camera.quaternion);
            
            const basePos = sword.userData.basePos;
            const swordPos = new THREE.Vector3();
            swordPos.copy(camera.position);
            swordPos.add(forward.clone().multiplyScalar(Math.abs(basePos.z)));
            swordPos.add(right.clone().multiplyScalar(basePos.x));
            swordPos.add(up.clone().multiplyScalar(basePos.y));
            sword.position.copy(swordPos);
            
            sword.quaternion.copy(camera.quaternion);
            const swingOffset = swordSwinging ? Math.sin(swordSwingTime * 15) * 1.2 : 0;
            sword.rotateX(sword.userData.baseRot.x + swingOffset);
            sword.rotateY(sword.userData.baseRot.y);
            sword.rotateZ(sword.userData.baseRot.z);
        }

        function swingSword() {
            if (swordSwinging) return;
            swordSwinging = true;
            swordSwingTime = 0;
        }

        function updateSwordAnimation(dt) {
            if (!sword) return;
            
            const swingDuration = 0.25;
            
            if (swordSwinging) {
                swordSwingTime += dt;
                const progress = swordSwingTime / swingDuration;
                
                if (progress >= 1) {
                    swordSwinging = false;
                    swordSwingTime = 0;
                }
            }
            
            updateSwordPosition();
        }

        // ========== 初始化 ==========
        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a2e);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 500);
            
            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('gameCanvas'), antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            
            minimapCtx = document.getElementById('minimap').getContext('2d');

            scene.add(new THREE.AmbientLight(0xffffff, 0.7));
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(50, 100, 50);
            scene.add(dirLight);

            generateMaze();
            createScene();
            
            const spawnPos = gridToWorld(3, 3);
            player.x = spawnPos.x;
            player.y = PLAYER_HEIGHT;
            player.z = spawnPos.z;
            player.rotY = Math.PI * 0.75;

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
            
            document.addEventListener('keydown', e => keys[e.code] = true);
            document.addEventListener('keyup', e => keys[e.code] = false);
            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('click', () => {
                if (running) document.body.requestPointerLock();
            });

            document.getElementById('startBtn').onclick = () => {
                connectToServer();
            };
            document.getElementById('restartBtn').onclick = restartGame;
            document.getElementById('replayBtn').onclick = restartGame;

            sword = createSword();
            scene.add(sword);

            animate();
        }

        function onMouseMove(e) {
            if (document.pointerLockElement !== document.body || !running) return;
            player.rotY -= e.movementX * 0.002;
            player.rotX -= e.movementY * 0.002;
            player.rotX = Math.max(-Math.PI/4, Math.min(Math.PI/4, player.rotX));
        }

        // ========== 迷宫生成 ==========
        function gridToWorld(gx, gz) {
            return {
                x: gx * CELL_SIZE + CELL_SIZE / 2,
                z: gz * CELL_SIZE + CELL_SIZE / 2
            };
        }

        function worldToGrid(x, z) {
            return {
                gx: Math.floor(x / CELL_SIZE),
                gz: Math.floor(z / CELL_SIZE)
            };
        }

        function generateMaze() {
            maze = [];
            for (let z = 0; z < MAZE_SIZE; z++) {
                maze[z] = [];
                for (let x = 0; x < MAZE_SIZE; x++) {
                    maze[z][x] = 1;
                }
            }
            
            // 使用种子生成伪随机数
            let seed = mazeSeed || Date.now();
            const seededRandom = () => {
                seed = (seed * 9301 + 49297) % 233280;
                return seed / 233280;
            };
            
            const stack = [[1, 1]];
            maze[1][1] = 0;
            
            while (stack.length > 0) {
                const [gx, gz] = stack[stack.length - 1];
                const dirs = [[0,2],[2,0],[0,-2],[-2,0]];
                
                // 打乱方向顺序
                for (let i = dirs.length - 1; i > 0; i--) {
                    const j = Math.floor(seededRandom() * (i + 1));
                    [dirs[i], dirs[j]] = [dirs[j], dirs[i]];
                }
                
                let found = false;
                for (const [dx, dz] of dirs) {
                    const nx = gx + dx;
                    const nz = gz + dz;
                    if (nx > 0 && nx < MAZE_SIZE-1 && nz > 0 && nz < MAZE_SIZE-1 && maze[nz][nx] === 1) {
                        maze[gz + dz/2][gx + dx/2] = 0;
                        maze[nz][nx] = 0;
                        stack.push([nx, nz]);
                        found = true;
                        break;
                    }
                }
                
                if (!found) stack.pop();
            }
            
            // 入口区域（左上角7x7）
            for (let z = 0; z < 7; z++) {
                for (let x = 0; x < 7; x++) {
                    maze[z][x] = 0;
                }
            }
            
            // 出口区域（右下角7x7）
            exitX = MAZE_SIZE - 4;
            exitZ = MAZE_SIZE - 4;
            for (let z = MAZE_SIZE - 7; z < MAZE_SIZE; z++) {
                for (let x = MAZE_SIZE - 7; x < MAZE_SIZE; x++) {
                    maze[z][x] = 0;
                }
            }
        }

        function createScene() {
            // 清理旧场景
            const toRemove = [];
            scene.traverse(obj => {
                if (obj.userData.sceneObject) toRemove.push(obj);
            });
            toRemove.forEach(obj => scene.remove(obj));
            
            traps = [];
            
            const floorGeo = new THREE.PlaneGeometry(MAZE_SIZE * CELL_SIZE, MAZE_SIZE * CELL_SIZE);
            const floorMat = new THREE.MeshStandardMaterial({ color: 0x2d2d44 });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            floor.position.set(MAZE_SIZE * CELL_SIZE / 2, 0, MAZE_SIZE * CELL_SIZE / 2);
            floor.userData.sceneObject = true;
            scene.add(floor);
            
            // 天花板
            const ceilingGeo = new THREE.PlaneGeometry(MAZE_SIZE * CELL_SIZE, MAZE_SIZE * CELL_SIZE);
            const ceilingMat = new THREE.MeshStandardMaterial({ color: 0x1a1a2e, side: THREE.BackSide });
            const ceiling = new THREE.Mesh(ceilingGeo, ceilingMat);
            ceiling.rotation.x = Math.PI / 2;
            ceiling.position.set(MAZE_SIZE * CELL_SIZE / 2, WALL_HEIGHT, MAZE_SIZE * CELL_SIZE / 2);
            ceiling.userData.sceneObject = true;
            scene.add(ceiling);
            
            // 墙壁
            const wallGeo = new THREE.BoxGeometry(CELL_SIZE, WALL_HEIGHT, CELL_SIZE);
            const wallMat = new THREE.MeshStandardMaterial({ color: 0x4a4a6a });
            
            for (let z = 0; z < MAZE_SIZE; z++) {
                for (let x = 0; x < MAZE_SIZE; x++) {
                    if (maze[z][x] === 1) {
                        const wall = new THREE.Mesh(wallGeo, wallMat);
                        wall.position.set(
                            x * CELL_SIZE + CELL_SIZE / 2,
                            WALL_HEIGHT / 2,
                            z * CELL_SIZE + CELL_SIZE / 2
                        );
                        wall.userData.sceneObject = true;
                        scene.add(wall);
                    }
                }
            }
            
            // 入口标记
            const entryGeo = new THREE.PlaneGeometry(CELL_SIZE * 5, CELL_SIZE * 5);
            const entryMat = new THREE.MeshBasicMaterial({ color: 0x00ff00, transparent: true, opacity: 0.3 });
            const entry = new THREE.Mesh(entryGeo, entryMat);
            entry.rotation.x = -Math.PI / 2;
            entry.position.set(3 * CELL_SIZE + CELL_SIZE/2, 0.01, 3 * CELL_SIZE + CELL_SIZE/2);
            entry.userData.sceneObject = true;
            scene.add(entry);
            
            // 出口标记
            const exitGeo = new THREE.PlaneGeometry(CELL_SIZE * 5, CELL_SIZE * 5);
            const exitMat = new THREE.MeshBasicMaterial({ color: 0xffd700, transparent: true, opacity: 0.5 });
            const exitMesh = new THREE.Mesh(exitGeo, exitMat);
            exitMesh.rotation.x = -Math.PI / 2;
            exitMesh.position.set(exitX * CELL_SIZE + CELL_SIZE/2, 0.01, exitZ * CELL_SIZE + CELL_SIZE/2);
            exitMesh.userData.sceneObject = true;
            scene.add(exitMesh);
            
            // 陷阱
            createTraps();
            
            // 玩家灯光
            const playerLight = new THREE.PointLight(0xffffff, 1, 30);
            playerLight.name = 'playerLight';
            playerLight.position.set(player.x, player.y + 2, player.z);
            scene.add(playerLight);
        }

        function createTraps() {
            const trapCount = 8 + level * 2;
            let placed = 0;
            let attempts = 0;
            
            const trapGeo = new THREE.PlaneGeometry(TRAP_SIZE * 2, TRAP_SIZE * 2);
            const trapMat = new THREE.MeshBasicMaterial({ color: 0xff0000, transparent: true, opacity: 0.5 });
            
            while (placed < trapCount && attempts < 500) {
                const gx = Math.floor(Math.random() * (MAZE_SIZE - 12)) + 6;
                const gz = Math.floor(Math.random() * (MAZE_SIZE - 12)) + 6;
                
                if (maze[gz][gx] === 0 && !(gx <= 8 && gz <= 8) && !(gx >= MAZE_SIZE-9 && gz >= MAZE_SIZE-9)) {
                    // 检查是否连续
                    let adjacent = false;
                    for (const trap of traps) {
                        if (Math.abs(trap.gx - gx) <= 1 && Math.abs(trap.gz - gz) <= 1) {
                            adjacent = true;
                            break;
                        }
                    }
                    
                    if (!adjacent) {
                        const trap = new THREE.Mesh(trapGeo, trapMat);
                        trap.rotation.x = -Math.PI / 2;
                        trap.position.set(gx * CELL_SIZE + CELL_SIZE/2, 0.02, gz * CELL_SIZE + CELL_SIZE/2);
                        trap.userData.sceneObject = true;
                        scene.add(trap);
                        traps.push({ gx, gz, mesh: trap });
                        placed++;
                    }
                }
                attempts++;
            }
        }

        // ========== 僵尸 ==========
        class Zombie {
            constructor(gx, gz, id) {
                this.id = id;
                this.gx = gx;
                this.gz = gz;
                this.speed = 1.5 + level * 0.2;
                this.stunned = false;
                this.stunEndTime = 0;
                this.attackCooldown = 0;
                this.stunStars = null;

                const pos = gridToWorld(gx, gz);
                
                const bodyGeo = new THREE.CylinderGeometry(0.4, 0.4, 1.8, 8);
                this.bodyMat = new THREE.MeshStandardMaterial({ color: 0x9370db, emissive: 0x4a0080, emissiveIntensity: 0.3 });
                this.mesh = new THREE.Mesh(bodyGeo, this.bodyMat);
                this.mesh.position.set(pos.x, 1, pos.z);
                this.mesh.userData.sceneObject = true;
                scene.add(this.mesh);

                const headGeo = new THREE.SphereGeometry(0.3, 8, 8);
                this.head = new THREE.Mesh(headGeo, this.bodyMat);
                this.head.position.set(0, 1.2, 0);
                this.mesh.add(this.head);

                const eyeGeo = new THREE.SphereGeometry(0.08, 8, 8);
                const eyeMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
                this.leftEye = new THREE.Mesh(eyeGeo, eyeMat);
                this.leftEye.position.set(-0.12, 1.2, 0.25);
                this.mesh.add(this.leftEye);
                this.rightEye = new THREE.Mesh(eyeGeo, eyeMat);
                this.rightEye.position.set(0.12, 1.2, 0.25);
                this.mesh.add(this.rightEye);
                
                this.createStunStars();
            }
            
            createStunStars() {
                this.stunStars = new THREE.Group();
                const starMat = new THREE.MeshBasicMaterial({ color: 0xffff00 });
                
                for (let i = 0; i < 3; i++) {
                    const starGroup = new THREE.Group();
                    const starGeo = new THREE.PlaneGeometry(0.15, 0.15);
                    
                    for (let j = 0; j < 2; j++) {
                        const star = new THREE.Mesh(starGeo, starMat);
                        star.rotation.z = j * Math.PI / 4;
                        starGroup.add(star);
                    }
                    
                    const angle = (i / 3) * Math.PI * 2;
                    starGroup.position.set(
                        Math.cos(angle) * 0.5,
                        2.0,
                        Math.sin(angle) * 0.5
                    );
                    this.stunStars.add(starGroup);
                }
                
                this.stunStars.visible = false;
                this.mesh.add(this.stunStars);
            }

            update(dt) {
                const now = Date.now();
                if (this.stunned) {
                    const stunTime = now / 1000;
                    
                    this.mesh.rotation.z = Math.sin(stunTime * 8) * 0.4;
                    this.mesh.rotation.x = Math.sin(stunTime * 6) * 0.2;
                    this.head.rotation.x = Math.sin(stunTime * 10) * 0.3;
                    this.head.rotation.z = Math.cos(stunTime * 8) * 0.3;
                    
                    this.leftEye.material.color.setHex(0xffff00);
                    this.rightEye.material.color.setHex(0xffff00);
                    
                    this.stunStars.rotation.y += dt * 3;
                    this.stunStars.visible = true;
                    
                    const flash = Math.sin(stunTime * 15) > 0;
                    this.bodyMat.emissiveIntensity = flash ? 0.8 : 0.4;
                    
                    if (now > this.stunEndTime) {
                        this.stunned = false;
                        this.stunStars.visible = false;
                        this.mesh.rotation.z = 0;
                        this.mesh.rotation.x = 0;
                        this.head.rotation.x = 0;
                        this.head.rotation.z = 0;
                        this.bodyMat.emissive.setHex(0x4a0080);
                        this.bodyMat.emissiveIntensity = 0.3;
                        this.leftEye.material.color.setHex(0xff0000);
                        this.rightEye.material.color.setHex(0xff0000);
                    }
                    return false;
                }

                this.mesh.rotation.z = 0;
                this.mesh.rotation.x = 0;
                if (this.attackCooldown > 0) this.attackCooldown -= dt;

                const dx = player.x - this.mesh.position.x;
                const dz = player.z - this.mesh.position.z;
                const dist = Math.sqrt(dx * dx + dz * dz);

                if (dist < 1.5 && this.attackCooldown <= 0) {
                    this.attackCooldown = 1;
                    return true;
                }

                if (dist > 1) {
                    const moveX = (dx / dist) * this.speed * dt;
                    const moveZ = (dz / dist) * this.speed * dt;

                    const newX = this.mesh.position.x + moveX;
                    const newZ = this.mesh.position.z + moveZ;

                    if (canMoveTo(newX, this.mesh.position.z)) this.mesh.position.x = newX;
                    if (canMoveTo(this.mesh.position.x, newZ)) this.mesh.position.z = newZ;

                    this.mesh.rotation.y = Math.atan2(dx, dz);
                }
                return false;
            }

            stun() {
                this.stunned = true;
                this.stunEndTime = Date.now() + 5000;
                this.bodyMat.emissive.setHex(0xffff00);
                this.bodyMat.emissiveIntensity = 0.6;
            }

            remove() {
                scene.remove(this.mesh);
            }
        }

        function generateZombies() {
            zombies.forEach(z => z.remove());
            zombies = [];
            
            const zombieCount = Math.min(2 + level, 8);
            let placed = 0;
            let attempts = 0;

            while (placed < zombieCount && attempts < 200) {
                const gx = Math.floor(Math.random() * (MAZE_SIZE - 12)) + 6;
                const gz = Math.floor(Math.random() * (MAZE_SIZE - 12)) + 6;

                if (maze[gz][gx] === 0 && !(gx <= 9 && gz <= 9) && !(gx >= MAZE_SIZE-10 && gz >= MAZE_SIZE-10)) {
                    const tooClose = zombies.some(z => Math.abs(z.gx - gx) + Math.abs(z.gz - gz) < 4);
                    if (!tooClose) {
                        zombies.push(new Zombie(gx, gz, placed));
                        placed++;
                    }
                }
                attempts++;
            }
            
            document.getElementById('zombieCount').textContent = zombies.length;
        }

        // ========== 碰撞检测 ==========
        function canMoveTo(x, z) {
            const { gx, gz } = worldToGrid(x, z);
            
            if (gx < 0 || gx >= MAZE_SIZE || gz < 0 || gz >= MAZE_SIZE) return false;
            
            const margin = PLAYER_RADIUS;
            const corners = [
                { x: x - margin, z: z - margin },
                { x: x + margin, z: z - margin },
                { x: x - margin, z: z + margin },
                { x: x + margin, z: z + margin }
            ];
            
            for (const corner of corners) {
                const { gx: cgx, gz: cgz } = worldToGrid(corner.x, corner.z);
                if (cgx < 0 || cgx >= MAZE_SIZE || cgz < 0 || cgz >= MAZE_SIZE) return false;
                if (maze[cgz][cgx] === 1) return false;
            }
            
            return true;
        }

        // ========== 攻击 ==========
        function attackZombie() {
            const attackRange = 3;
            const attackAngle = Math.PI / 3;

            for (const zombie of zombies) {
                if (zombie.stunned) continue;

                const dx = zombie.mesh.position.x - player.x;
                const dz = zombie.mesh.position.z - player.z;
                const dist = Math.sqrt(dx * dx + dz * dz);

                if (dist < attackRange) {
                    const angleToZombie = Math.atan2(dx, dz);
                    let angleDiff = angleToZombie - player.rotY;
                    while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
                    while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;

                    if (Math.abs(angleDiff) < attackAngle) {
                        zombie.stun();
                        // 同步给其他玩家
                        sendMessage({ type: 'stun_zombie', zombie_id: zombie.id });
                        break;
                    }
                }
            }
        }

        function playAttackAnimation() {
            const crosshair = document.querySelector('.crosshair');
            const attackEffect = document.getElementById('attackEffect');
            if (!crosshair || !attackEffect) return;

            crosshair.classList.remove('attacking');
            attackEffect.classList.remove('active');
            void crosshair.offsetWidth;
            crosshair.classList.add('attacking');
            attackEffect.classList.add('active');
            
            swingSword();
            
            // 同步攻击动作
            sendMessage({ type: 'attack' });

            if (attackAnimTimer) {
                clearTimeout(attackAnimTimer);
            }
            attackAnimTimer = setTimeout(() => {
                crosshair.classList.remove('attacking');
                attackEffect.classList.remove('active');
                attackAnimTimer = 0;
            }, ATTACK_ANIM_MS);
        }

        // ========== 小地图 ==========
        function updateMinimap() {
            const ctx = minimapCtx;
            const canvas = ctx.canvas;
            const { gx: px, gz: pz } = worldToGrid(player.x, player.z);
            const range = 8;
            
            ctx.fillStyle = '#111';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            const cellSize = canvas.width / (range * 2 + 1);
            
            for (let dz = -range; dz <= range; dz++) {
                for (let dx = -range; dx <= range; dx++) {
                    const gx = px + dx;
                    const gz = pz + dz;
                    
                    if (gx < 0 || gx >= MAZE_SIZE || gz < 0 || gz >= MAZE_SIZE) continue;
                    
                    const screenX = (dx + range) * cellSize;
                    const screenY = (dz + range) * cellSize;
                    
                    if (maze[gz][gx] === 1) {
                        ctx.fillStyle = '#4a4a6a';
                        ctx.fillRect(screenX, screenY, cellSize, cellSize);
                    } else {
                        ctx.fillStyle = '#2d2d44';
                        ctx.fillRect(screenX, screenY, cellSize, cellSize);
                    }
                }
            }
            
            // 陷阱
            ctx.fillStyle = 'rgba(255,0,0,0.5)';
            for (const trap of traps) {
                const dx = trap.gx - px;
                const dz = trap.gz - pz;
                if (Math.abs(dx) <= range && Math.abs(dz) <= range) {
                    const screenX = (dx + range) * cellSize;
                    const screenY = (dz + range) * cellSize;
                    ctx.fillRect(screenX, screenY, cellSize, cellSize);
                }
            }
            
            // 出口
            const exitDx = exitX - px;
            const exitDz = exitZ - pz;
            if (Math.abs(exitDx) <= range && Math.abs(exitDz) <= range) {
                ctx.fillStyle = '#ffd700';
                ctx.fillRect((exitDx + range) * cellSize, (exitDz + range) * cellSize, cellSize, cellSize);
            }
            
            // 僵尸
            ctx.fillStyle = '#9370db';
            for (const zombie of zombies) {
                const { gx, gz } = worldToGrid(zombie.mesh.position.x, zombie.mesh.position.z);
                const dx = gx - px;
                const dz = gz - pz;
                if (Math.abs(dx) <= range && Math.abs(dz) <= range) {
                    ctx.beginPath();
                    ctx.arc((dx + range) * cellSize + cellSize/2, (dz + range) * cellSize + cellSize/2, cellSize/3, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
            
            // 其他玩家
            ctx.fillStyle = '#00aaff';
            for (const [pid, op] of Object.entries(otherPlayers)) {
                const { gx, gz } = worldToGrid(op.x, op.z);
                const dx = gx - px;
                const dz = gz - pz;
                if (Math.abs(dx) <= range && Math.abs(dz) <= range) {
                    ctx.beginPath();
                    ctx.arc((dx + range) * cellSize + cellSize/2, (dz + range) * cellSize + cellSize/2, cellSize/3, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
            
            // 玩家自己
            ctx.fillStyle = '#00ff00';
            ctx.beginPath();
            ctx.arc(range * cellSize + cellSize/2, range * cellSize + cellSize/2, cellSize/2.5, 0, Math.PI * 2);
            ctx.fill();
            
            // 方向指示
            ctx.strokeStyle = '#00ff00';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(range * cellSize + cellSize/2, range * cellSize + cellSize/2);
            ctx.lineTo(
                range * cellSize + cellSize/2 - Math.sin(player.rotY) * cellSize,
                range * cellSize + cellSize/2 - Math.cos(player.rotY) * cellSize
            );
            ctx.stroke();
        }

        // ========== UI更新 ==========
        function updateLivesUI() {
            document.getElementById('lives').textContent = '❤️'.repeat(player.lives) + '🖤'.repeat(3 - player.lives);
        }

        function playerHit() {
            const now = Date.now();
            if (now - player.lastDamageTime < 1000) return;
            
            player.lastDamageTime = now;
            player.lives--;
            updateLivesUI();
            
            // 同步受伤
            sendMessage({ type: 'player_hit', lives: player.lives });
            
            document.getElementById('warning').classList.add('active');
            setTimeout(() => document.getElementById('warning').classList.remove('active'), 200);
            
            if (player.lives <= 0) {
                running = false;
                document.getElementById('deathLevel').textContent = level;
                document.getElementById('gameOver').style.display = 'flex';
                document.exitPointerLock();
                sendMessage({ type: 'game_over' });
            }
        }

        function checkWin() {
            const { gx, gz } = worldToGrid(player.x, player.z);
            const exitGridX = Math.floor(exitX);
            const exitGridZ = Math.floor(exitZ);
            
            if (Math.abs(gx - exitGridX) <= 3 && Math.abs(gz - exitGridZ) <= 3) {
                // 通知服务器通关
                sendMessage({ type: 'win' });
                return true;
            }
            return false;
        }

        // ========== 游戏控制 ==========
        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('waitingScreen').style.display = 'none';
            document.getElementById('gameOver').style.display = 'none';
            document.getElementById('winScreen').style.display = 'none';
            
            player.lives = 3;
            
            loadLevel();
            
            camera.position.set(player.x, player.y, player.z);
            camera.rotation.set(0, 0, 0);
            camera.rotateY(player.rotY);
            camera.rotateX(player.rotX);
            
            running = true;
            
            document.body.requestPointerLock();
        }

        function loadLevel() {
            generateMaze();
            createScene();
            generateZombies();

            const spawnPos = gridToWorld(3, 3);
            player.x = spawnPos.x;
            player.y = PLAYER_HEIGHT;
            player.z = spawnPos.z;
            player.vx = player.vy = player.vz = 0;
            player.rotY = Math.PI * 0.75;
            player.rotX = 0;
            player.grounded = true;
            player.lastDamageTime = 0;
            lastAttackTime = -Infinity;

            document.getElementById('level').textContent = level;
            updateLivesUI();
        }

        function restartGame() {
            level = 1;
            player.lives = 3;
            mazeSeed = 0;
            
            // 重新连接
            if (ws) {
                ws.close();
            }
            
            document.getElementById('startScreen').style.display = 'flex';
            document.getElementById('gameOver').style.display = 'none';
            document.getElementById('winScreen').style.display = 'none';
        }

        // ========== 主循环 ==========
        function animate(time = 0) {
            requestAnimationFrame(animate);
            
            const dt = Math.min((time - lastTime) / 1000, 0.1);
            lastTime = time;

            if (!running) {
                camera.position.set(player.x, player.y, player.z);
                camera.rotation.set(0, 0, 0);
                camera.rotateY(player.rotY);
                camera.rotateX(player.rotX);
                renderer.render(scene, camera);
                return;
            }

            // 输入
            let moveX = 0, moveZ = 0;
            if (keys['KeyW'] || keys['ArrowUp']) moveZ = -1;
            if (keys['KeyS'] || keys['ArrowDown']) moveZ = 1;
            if (keys['KeyA'] || keys['ArrowLeft']) moveX = -1;
            if (keys['KeyD'] || keys['ArrowRight']) moveX = 1;

            if (keys['Space'] && player.grounded) {
                player.vy = JUMP_FORCE;
                player.grounded = false;
                keys['Space'] = false;
            }

            const angle = player.rotY;
            let dirX = Math.sin(angle) * moveZ + Math.cos(angle) * moveX;
            let dirZ = Math.cos(angle) * moveZ - Math.sin(angle) * moveX;
            const dirLen = Math.hypot(dirX, dirZ);
            if (dirLen > 0) {
                dirX /= dirLen;
                dirZ /= dirLen;
            }

            const accel = player.grounded ? MOVE_ACCEL : MOVE_ACCEL * AIR_ACCEL_FACTOR;
            player.vx += dirX * accel * dt;
            player.vz += dirZ * accel * dt;

            const drag = player.grounded ? GROUND_DRAG : AIR_DRAG;
            const damping = Math.max(0, 1 - drag * dt);
            player.vx *= damping;
            player.vz *= damping;

            const speed = Math.hypot(player.vx, player.vz);
            if (speed > MOVE_SPEED) {
                const scale = MOVE_SPEED / speed;
                player.vx *= scale;
                player.vz *= scale;
            } else if (speed < 0.01) {
                player.vx = 0;
                player.vz = 0;
            }

            const newX = player.x + player.vx * dt;
            const newZ = player.z + player.vz * dt;

            if (canMoveTo(newX, player.z)) player.x = newX;
            else player.vx = 0;
            if (canMoveTo(player.x, newZ)) player.z = newZ;
            else player.vz = 0;

            player.vy -= GRAVITY * dt;
            player.y += player.vy * dt;
            
            if (player.y <= PLAYER_HEIGHT) {
                player.y = PLAYER_HEIGHT;
                player.vy = 0;
                player.grounded = true;
            }

            // 陷阱检测
            const { gx, gz } = worldToGrid(player.x, player.z);
            for (const trap of traps) {
                if (trap.gx === gx && trap.gz === gz && player.grounded) {
                    playerHit();
                    break;
                }
            }

            // 僵尸更新
            for (const zombie of zombies) {
                if (zombie.update(dt)) {
                    playerHit();
                }
            }
            updateLivesUI();

            // 相机
            camera.position.set(player.x, player.y, player.z);
            camera.rotation.set(0, 0, 0);
            camera.rotateY(player.rotY);
            camera.rotateX(player.rotX);

            // 玩家灯光
            const pl = scene.getObjectByName('playerLight');
            if (pl) {
                pl.position.set(player.x, player.y + 2, player.z);
            }

            // 检查胜利
            if (checkWin()) {
                // 等待服务器返回level_complete
            }

            // 同步玩家位置
            if (connected && time - lastSyncTime > SYNC_INTERVAL) {
                lastSyncTime = time;
                sendMessage({
                    type: 'update',
                    x: player.x,
                    y: player.y,
                    z: player.z,
                    rot_y: player.rotY,
                    rot_x: player.rotX,
                    lives: player.lives
                });
            }
            
            // 更新其他玩家视觉效果
            updateOtherPlayersVisual(dt);

            updateMinimap();
            updateSwordAnimation(dt);
            renderer.render(scene, camera);
        }

        // 点击攻击
        document.addEventListener('mousedown', (e) => {
            if (e.button === 0 && running) {
                const now = performance.now();
                if (now - lastAttackTime < ATTACK_COOLDOWN_MS) return;
                lastAttackTime = now;
                attackZombie();
                playAttackAnimation();
            }
        });

        // 启动
        window.addEventListener('load', init);
    </script>
</body>
</html>
