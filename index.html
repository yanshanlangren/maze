<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D迷宫逃脱</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; font-family: Arial, sans-serif; }
        #gameCanvas { display: block; }
        
        #ui {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
        }
        
        .stat-box {
            position: absolute;
            top: 20px; left: 20px;
            background: rgba(0,0,0,0.8);
            color: #fff;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 16px;
        }
        
        #minimapContainer {
            position: absolute;
            top: 80px; left: 20px;
            background: rgba(0,0,0,0.9);
            border-radius: 8px;
            padding: 10px;
            border: 2px solid #444;
        }
        
        #minimapTitle { color: #aaa; font-size: 12px; margin-bottom: 5px; text-align: center; }
        #minimap { display: block; }
        
        .crosshair {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 20px; height: 20px;
        }
        .crosshair::before, .crosshair::after {
            content: '';
            position: absolute;
            background: rgba(255,255,255,0.7);
        }
        .crosshair::before { width: 2px; height: 20px; left: 9px; }
        .crosshair::after { width: 20px; height: 2px; top: 9px; }
        
        .hint {
            position: absolute;
            bottom: 20px; left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: #aaa;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
        }
        
        .warning {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            background: radial-gradient(ellipse at center, transparent 50%, rgba(255,0,0,0.4) 100%);
            opacity: 0;
            transition: opacity 0.1s;
        }
        .warning.active { opacity: 1; }
        
        #startScreen, #winScreen, #gameOver {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.95);
            z-index: 100;
        }
        
        #winScreen, #gameOver { display: none; }
        
        h1 { color: #ffd700; font-size: 3rem; margin-bottom: 15px; }
        .subtitle { color: #ff6b6b; font-size: 1.2rem; margin-bottom: 40px; }
        .instructions { color: #888; text-align: center; margin-top: 30px; line-height: 2; }
        
        button {
            background: linear-gradient(45deg, #ffd700, #ffaa00);
            color: #000;
            border: none;
            padding: 18px 50px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            pointer-events: auto;
        }
        button:hover { transform: scale(1.05); }
        
        .restart-btn {
            background: linear-gradient(45deg, #ff6b6b, #ff8e8e);
            color: #fff;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div id="ui">
        <div class="stat-box">
            <span style="color:#ffd700">关卡: <span id="level">1</span>/16</span> | 
            <span style="color:#ff6b6b">生命: <span id="lives">❤️❤️❤️</span></span> |
            <span style="color:#9370db">僵尸: <span id="zombieCount">0</span></span>
        </div>
        
        <div id="minimapContainer">
            <div id="minimapTitle">小地图</div>
            <canvas id="minimap" width="160" height="160"></canvas>
        </div>
        
        <div class="crosshair"></div>
        <div class="warning" id="warning"></div>
        
        <div class="hint">
            WASD 移动 | 空格 跳跃 | 鼠标 转向 | 左键 攻击僵尸
        </div>
    </div>
    
    <div id="startScreen">
        <h1>3D迷宫逃脱</h1>
        <p class="subtitle">探索迷宫，躲避陷阱与僵尸，找到出口！</p>
        <button id="startBtn">开始游戏</button>
        <div class="instructions">
            <p>WASD 移动 | 空格 跳跃 | 鼠标 转向 | 左键 攻击</p>
            <p><span style="color:#00ff00">绿色</span> 起点 | <span style="color:#ffd700">金色</span> 终点 | <span style="color:#ff0000">红色</span> 陷阱 | <span style="color:#9370db">紫色</span> 僵尸</p>
        </div>
    </div>
    
    <div id="gameOver">
        <h1 style="color:#ff6b6b">游戏结束</h1>
        <p style="color:#aaa;margin:20px 0">你在第 <span id="deathLevel">1</span> 关倒下了...</p>
        <button class="restart-btn" id="restartBtn">重新开始</button>
    </div>
    
    <div id="winScreen">
        <h1>恭喜通关！</h1>
        <p style="color:#ffd700;font-size:1.3rem;margin-bottom:30px">你成功通过了所有16关！</p>
        <button id="replayBtn">再玩一次</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // ========== 配置 ==========
        const CELL_SIZE = 4;      // 每个格子的大小
        const MAZE_SIZE = 32;     // 迷宫格子数
        const WALL_HEIGHT = 4;    // 墙高
        const PLAYER_HEIGHT = 1.6;
        const PLAYER_RADIUS = 0.35;
        const MOVE_SPEED = 5;
        const JUMP_FORCE = 8;
        const GRAVITY = 20;

        // ========== 全局变量 ==========
        let scene, camera, renderer, minimapCtx;
        let maze = [];  // maze[z][x], 0=通道, 1=墙
        let player = {
            x: 0, y: PLAYER_HEIGHT, z: 0,
            vx: 0, vy: 0, vz: 0,
            rotY: 0, rotX: 0,
            grounded: true,
            lives: 3,
            lastDamageTime: 0
        };
        let keys = {};
        let level = 1;
        let running = false;
        let traps = [];
        let zombies = [];
        let exitX = 0, exitZ = 0;

        // ========== 初始化 ==========
        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a2e);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 500);
            
            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('gameCanvas'), antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            
            minimapCtx = document.getElementById('minimap').getContext('2d');

            // 光照
            scene.add(new THREE.AmbientLight(0xffffff, 0.7));
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(50, 100, 50);
            scene.add(dirLight);

            // 事件
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
            
            document.addEventListener('keydown', e => keys[e.code] = true);
            document.addEventListener('keyup', e => keys[e.code] = false);
            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('click', () => {
                if (running) document.body.requestPointerLock();
            });

            document.getElementById('startBtn').onclick = startGame;
            document.getElementById('restartBtn').onclick = startGame;
            document.getElementById('replayBtn').onclick = startGame;

            animate();
        }

        function onMouseMove(e) {
            if (document.pointerLockElement !== document.body || !running) return;
            player.rotY -= e.movementX * 0.002;
            player.rotX -= e.movementY * 0.002;
            player.rotX = Math.max(-Math.PI/4, Math.min(Math.PI/4, player.rotX));
        }

        // ========== 迷宫生成 ==========
        // 坐标系统：
        // - 格子索引: gx(列), gz(行)，范围 [0, MAZE_SIZE-1]
        // - 世界坐标: x = gx * CELL_SIZE + CELL_SIZE/2, z = gz * CELL_SIZE + CELL_SIZE/2
        // - 数组索引: maze[gz][gx]
        
        function generateMaze() {
            // 初始化全为墙
            maze = [];
            for (let z = 0; z < MAZE_SIZE; z++) {
                maze[z] = [];
                for (let x = 0; x < MAZE_SIZE; x++) {
                    maze[z][x] = 1;
                }
            }
            
            // DFS挖通道
            const stack = [[1, 1]];
            maze[1][1] = 0;
            
            while (stack.length > 0) {
                const [gx, gz] = stack[stack.length - 1];
                const dirs = [[0,2],[2,0],[0,-2],[-2,0]];
                const neighbors = [];
                
                for (const [dx, dz] of dirs) {
                    const nx = gx + dx;
                    const nz = gz + dz;
                    if (nx > 0 && nx < MAZE_SIZE-1 && nz > 0 && nz < MAZE_SIZE-1 && maze[nz][nx] === 1) {
                        neighbors.push([nx, nz, dx/2, dz/2]);
                    }
                }
                
                if (neighbors.length > 0) {
                    const [nx, nz, dx, dz] = neighbors[Math.floor(Math.random() * neighbors.length)];
                    maze[gz + dz][gx + dx] = 0;
                    maze[nz][nx] = 0;
                    stack.push([nx, nz]);
                } else {
                    stack.pop();
                }
            }

            // 清空入口区域 (左上角 7x7)
            for (let gz = 0; gz < 7; gz++) {
                for (let gx = 0; gx < 7; gx++) {
                    maze[gz][gx] = 0;
                }
            }
            
            // 清空出口区域 (右下角 7x7)
            for (let gz = MAZE_SIZE - 7; gz < MAZE_SIZE; gz++) {
                for (let gx = MAZE_SIZE - 7; gx < MAZE_SIZE; gx++) {
                    maze[gz][gx] = 0;
                }
            }
        }

        // 格子索引 -> 世界坐标
        function gridToWorld(gx, gz) {
            return {
                x: gx * CELL_SIZE + CELL_SIZE / 2,
                z: gz * CELL_SIZE + CELL_SIZE / 2
            };
        }

        // 世界坐标 -> 格子索引
        function worldToGrid(x, z) {
            return {
                gx: Math.floor(x / CELL_SIZE),
                gz: Math.floor(z / CELL_SIZE)
            };
        }

        // 检查某格子是否是墙
        function isWallGrid(gx, gz) {
            if (gx < 0 || gx >= MAZE_SIZE || gz < 0 || gz >= MAZE_SIZE) return true;
            return maze[gz][gx] === 1;
        }

        // 检查世界坐标位置是否可通行
        function canMoveTo(x, z) {
            const r = PLAYER_RADIUS;
            const margin = 0.1;
            // 检查玩家包围盒四角
            return !isWallGrid(Math.floor((x - r + margin) / CELL_SIZE), Math.floor((z - r + margin) / CELL_SIZE)) &&
                   !isWallGrid(Math.floor((x + r - margin) / CELL_SIZE), Math.floor((z - r + margin) / CELL_SIZE)) &&
                   !isWallGrid(Math.floor((x - r + margin) / CELL_SIZE), Math.floor((z + r - margin) / CELL_SIZE)) &&
                   !isWallGrid(Math.floor((x + r - margin) / CELL_SIZE), Math.floor((z + r - margin) / CELL_SIZE));
        }

        // ========== 创建3D场景 ==========
        function createScene() {
            // 清除旧对象
            while (scene.children.length > 0) {
                scene.remove(scene.children[scene.children.length - 1]);
            }
            
            // 重新添加光照
            scene.add(new THREE.AmbientLight(0xffffff, 0.7));
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(50, 100, 50);
            scene.add(dirLight);
            
            traps = [];
            zombies = [];

            // 地板
            const floorGeo = new THREE.PlaneGeometry(MAZE_SIZE * CELL_SIZE, MAZE_SIZE * CELL_SIZE);
            const floorMat = new THREE.MeshStandardMaterial({ color: 0x3a3a4a });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            floor.position.set(MAZE_SIZE * CELL_SIZE / 2, 0, MAZE_SIZE * CELL_SIZE / 2);
            scene.add(floor);

            // 天花板
            const ceilMat = new THREE.MeshStandardMaterial({ 
                color: 0x2a2a3a, transparent: true, opacity: 0.5, side: THREE.DoubleSide 
            });
            const ceiling = new THREE.Mesh(floorGeo, ceilMat);
            ceiling.rotation.x = Math.PI / 2;
            ceiling.position.set(MAZE_SIZE * CELL_SIZE / 2, WALL_HEIGHT, MAZE_SIZE * CELL_SIZE / 2);
            scene.add(ceiling);

            // 墙壁材质
            const wallMat = new THREE.MeshStandardMaterial({ color: 0x5a5a6a });
            const wallGeo = new THREE.BoxGeometry(CELL_SIZE, WALL_HEIGHT, CELL_SIZE);

            // 内部墙壁
            for (let gz = 0; gz < MAZE_SIZE; gz++) {
                for (let gx = 0; gx < MAZE_SIZE; gx++) {
                    if (maze[gz][gx] === 1) {
                        const wall = new THREE.Mesh(wallGeo, wallMat);
                        const pos = gridToWorld(gx, gz);
                        wall.position.set(pos.x, WALL_HEIGHT / 2, pos.z);
                        scene.add(wall);
                    }
                }
            }

            // 边界墙
            const boundaryMat = new THREE.MeshStandardMaterial({ color: 0x4a4a5a });
            const bw = CELL_SIZE;
            
            // 北墙
            const northWall = new THREE.Mesh(new THREE.BoxGeometry(MAZE_SIZE * CELL_SIZE + bw*2, WALL_HEIGHT, bw), boundaryMat);
            northWall.position.set(MAZE_SIZE * CELL_SIZE / 2, WALL_HEIGHT / 2, -bw / 2);
            scene.add(northWall);
            
            // 南墙
            const southWall = new THREE.Mesh(new THREE.BoxGeometry(MAZE_SIZE * CELL_SIZE + bw*2, WALL_HEIGHT, bw), boundaryMat);
            southWall.position.set(MAZE_SIZE * CELL_SIZE / 2, WALL_HEIGHT / 2, MAZE_SIZE * CELL_SIZE + bw / 2);
            scene.add(southWall);
            
            // 西墙
            const westWall = new THREE.Mesh(new THREE.BoxGeometry(bw, WALL_HEIGHT, MAZE_SIZE * CELL_SIZE + bw*2), boundaryMat);
            westWall.position.set(-bw / 2, WALL_HEIGHT / 2, MAZE_SIZE * CELL_SIZE / 2);
            scene.add(westWall);
            
            // 东墙
            const eastWall = new THREE.Mesh(new THREE.BoxGeometry(bw, WALL_HEIGHT, MAZE_SIZE * CELL_SIZE + bw*2), boundaryMat);
            eastWall.position.set(MAZE_SIZE * CELL_SIZE + bw / 2, WALL_HEIGHT / 2, MAZE_SIZE * CELL_SIZE / 2);
            scene.add(eastWall);

            // 入口标记（绿色）- 玩家出生点
            const entranceMat = new THREE.MeshStandardMaterial({ color: 0x00ff00, emissive: 0x00ff00, emissiveIntensity: 0.5 });
            const entrance = new THREE.Mesh(new THREE.BoxGeometry(CELL_SIZE * 2, 0.1, CELL_SIZE * 2), entranceMat);
            const entrancePos = gridToWorld(3, 3);
            entrance.position.set(entrancePos.x, 0.1, entrancePos.z);
            scene.add(entrance);

            const entranceLight = new THREE.PointLight(0x00ff00, 2, 25);
            entranceLight.position.set(entrancePos.x, 2, entrancePos.z);
            scene.add(entranceLight);

            // 出口标记（金色）- 右下角
            exitX = MAZE_SIZE - 4;
            exitZ = MAZE_SIZE - 4;
            const exitMat = new THREE.MeshStandardMaterial({ color: 0xffd700, emissive: 0xffd700, emissiveIntensity: 0.8 });
            const exitMarker = new THREE.Mesh(new THREE.BoxGeometry(CELL_SIZE * 2, 0.1, CELL_SIZE * 2), exitMat);
            const exitPos = gridToWorld(exitX, exitZ);
            exitMarker.position.set(exitPos.x, 0.1, exitPos.z);
            scene.add(exitMarker);

            const exitLight = new THREE.PointLight(0xffd700, 3, 30);
            exitLight.position.set(exitPos.x, 2, exitPos.z);
            scene.add(exitLight);

            // 出口光柱
            const beamGeo = new THREE.CylinderGeometry(1, 1, WALL_HEIGHT, 16);
            const beamMat = new THREE.MeshBasicMaterial({ color: 0xffd700, transparent: true, opacity: 0.2 });
            const beam = new THREE.Mesh(beamGeo, beamMat);
            beam.position.set(exitPos.x, WALL_HEIGHT / 2, exitPos.z);
            scene.add(beam);

            // 玩家灯光
            const playerLight = new THREE.PointLight(0xffffff, 0.8, 15);
            playerLight.name = 'playerLight';
            scene.add(playerLight);

            // 生成陷阱和僵尸
            generateTraps();
            generateZombies();
        }

        // ========== 陷阱系统 ==========
        function generateTraps() {
            const trapCount = 15 + level * 3;
            let placed = 0;
            let attempts = 0;

            while (placed < trapCount && attempts < 500) {
                const gx = Math.floor(Math.random() * (MAZE_SIZE - 10)) + 5;
                const gz = Math.floor(Math.random() * (MAZE_SIZE - 10)) + 5;

                if (maze[gz][gx] === 0 && !(gx <= 8 && gz <= 8) && !(gx >= MAZE_SIZE-9 && gz >= MAZE_SIZE-9)) {
                    const hasAdjacent = traps.some(t => Math.abs(t.gx - gx) + Math.abs(t.gz - gz) <= 1);
                    if (!hasAdjacent) {
                        const trapMat = new THREE.MeshStandardMaterial({ 
                            color: 0xff0000, emissive: 0xff0000, emissiveIntensity: 0.4, transparent: true, opacity: 0.8
                        });
                        const pos = gridToWorld(gx, gz);
                        const trapMesh = new THREE.Mesh(new THREE.BoxGeometry(CELL_SIZE * 0.8, 0.15, CELL_SIZE * 0.8), trapMat);
                        trapMesh.position.set(pos.x, 0.1, pos.z);
                        scene.add(trapMesh);
                        
                        traps.push({ gx, gz, mesh: trapMesh });
                        placed++;
                    }
                }
                attempts++;
            }
        }

        function checkTrapDamage() {
            if (!player.grounded) return false;
            const now = Date.now();
            if (now - player.lastDamageTime < 1000) return false;

            const { gx, gz } = worldToGrid(player.x, player.z);
            for (const trap of traps) {
                if (trap.gx === gx && trap.gz === gz) {
                    player.lastDamageTime = now;
                    return true;
                }
            }
            return false;
        }

        // ========== 僵尸系统 ==========
        class Zombie {
            constructor(gx, gz) {
                this.gx = gx;
                this.gz = gz;
                this.speed = 1.5 + level * 0.2;
                this.stunned = false;
                this.stunEndTime = 0;
                this.attackCooldown = 0;

                const pos = gridToWorld(gx, gz);
                
                const bodyGeo = new THREE.CapsuleGeometry(0.4, 1, 4, 8);
                const bodyMat = new THREE.MeshStandardMaterial({ color: 0x9370db, emissive: 0x4a0080, emissiveIntensity: 0.3 });
                this.mesh = new THREE.Mesh(bodyGeo, bodyMat);
                this.mesh.position.set(pos.x, 1, pos.z);
                scene.add(this.mesh);

                // 眼睛
                const eyeGeo = new THREE.SphereGeometry(0.1, 8, 8);
                const eyeMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
                const leftEye = new THREE.Mesh(eyeGeo, eyeMat);
                leftEye.position.set(-0.15, 0.3, 0.35);
                this.mesh.add(leftEye);
                const rightEye = new THREE.Mesh(eyeGeo, eyeMat);
                rightEye.position.set(0.15, 0.3, 0.35);
                this.mesh.add(rightEye);
            }

            update(dt) {
                const now = Date.now();
                if (this.stunned) {
                    if (now > this.stunEndTime) {
                        this.stunned = false;
                        this.mesh.material.emissive.setHex(0x4a0080);
                    }
                    this.mesh.rotation.z = Math.sin(now / 100) * 0.3;
                    return false;
                }

                this.mesh.rotation.z = 0;
                if (this.attackCooldown > 0) this.attackCooldown -= dt;

                const dx = player.x - this.mesh.position.x;
                const dz = player.z - this.mesh.position.z;
                const dist = Math.sqrt(dx * dx + dz * dz);

                if (dist < 1.5 && this.attackCooldown <= 0) {
                    this.attackCooldown = 1;
                    return true;
                }

                if (dist > 1) {
                    const moveX = (dx / dist) * this.speed * dt;
                    const moveZ = (dz / dist) * this.speed * dt;

                    const newX = this.mesh.position.x + moveX;
                    const newZ = this.mesh.position.z + moveZ;

                    if (canMoveTo(newX, this.mesh.position.z)) this.mesh.position.x = newX;
                    if (canMoveTo(this.mesh.position.x, newZ)) this.mesh.position.z = newZ;

                    this.mesh.rotation.y = Math.atan2(dx, dz);
                }
                return false;
            }

            stun() {
                this.stunned = true;
                this.stunEndTime = Date.now() + 3000;
                this.mesh.material.emissive.setHex(0xffff00);
            }

            remove() {
                scene.remove(this.mesh);
            }
        }

        function generateZombies() {
            const zombieCount = Math.min(2 + level, 8);
            let placed = 0;
            let attempts = 0;

            while (placed < zombieCount && attempts < 200) {
                const gx = Math.floor(Math.random() * (MAZE_SIZE - 12)) + 6;
                const gz = Math.floor(Math.random() * (MAZE_SIZE - 12)) + 6;

                if (maze[gz][gx] === 0 && !(gx <= 9 && gz <= 9) && !(gx >= MAZE_SIZE-10 && gz >= MAZE_SIZE-10)) {
                    const tooClose = zombies.some(z => Math.abs(z.gx - gx) + Math.abs(z.gz - gz) < 4);
                    if (!tooClose) {
                        zombies.push(new Zombie(gx, gz));
                        placed++;
                    }
                }
                attempts++;
            }
        }

        function attackZombie() {
            const attackRange = 3;
            const attackAngle = Math.PI / 3;

            for (const zombie of zombies) {
                if (zombie.stunned) continue;

                const dx = zombie.mesh.position.x - player.x;
                const dz = zombie.mesh.position.z - player.z;
                const dist = Math.sqrt(dx * dx + dz * dz);

                if (dist < attackRange) {
                    const angleToZombie = Math.atan2(dx, dz);
                    let angleDiff = angleToZombie - player.rotY;
                    while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
                    while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;

                    if (Math.abs(angleDiff) < attackAngle) {
                        zombie.stun();
                        break;
                    }
                }
            }
        }

        // ========== 小地图 ==========
        function updateMinimap() {
            const ctx = minimapCtx;
            const canvas = ctx.canvas;
            const { gx: px, gz: pz } = worldToGrid(player.x, player.z);
            const range = 8;
            
            ctx.fillStyle = '#111';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            const cellPx = canvas.width / (range * 2 + 1);
            
            for (let dz = -range; dz <= range; dz++) {
                for (let dx = -range; dx <= range; dx++) {
                    const mx = px + dx;
                    const mz = pz + dz;
                    const sx = (dx + range) * cellPx;
                    const sy = (dz + range) * cellPx;
                    
                    if (mx < 0 || mx >= MAZE_SIZE || mz < 0 || mz >= MAZE_SIZE) {
                        ctx.fillStyle = '#000';
                    } else if (maze[mz][mx] === 1) {
                        ctx.fillStyle = '#555';
                    } else {
                        ctx.fillStyle = '#888';
                    }
                    ctx.fillRect(sx, sy, cellPx, cellPx);
                }
            }
            
            // 陷阱
            ctx.fillStyle = '#ff0000';
            for (const trap of traps) {
                const dx = trap.gx - px;
                const dz = trap.gz - pz;
                if (Math.abs(dx) <= range && Math.abs(dz) <= range) {
                    ctx.fillRect((dx + range) * cellPx + 2, (dz + range) * cellPx + 2, cellPx - 4, cellPx - 4);
                }
            }
            
            // 僵尸
            ctx.fillStyle = '#9370db';
            for (const zombie of zombies) {
                const { gx, gz } = worldToGrid(zombie.mesh.position.x, zombie.mesh.position.z);
                const dx = gx - px;
                const dz = gz - pz;
                if (Math.abs(dx) <= range && Math.abs(dz) <= range) {
                    ctx.beginPath();
                    ctx.arc((dx + range) * cellPx + cellPx/2, (dz + range) * cellPx + cellPx/2, cellPx/2, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
            
            // 出口
            const edx = exitX - px;
            const edz = exitZ - pz;
            if (Math.abs(edx) <= range && Math.abs(edz) <= range) {
                ctx.fillStyle = '#ffd700';
                ctx.fillRect((edx + range) * cellPx, (edz + range) * cellPx, cellPx, cellPx);
            }
            
            // 玩家
            ctx.fillStyle = '#00ff00';
            ctx.beginPath();
            ctx.arc(canvas.width / 2, canvas.height / 2, cellPx / 2, 0, Math.PI * 2);
            ctx.fill();
        }

        // ========== 玩家受伤 ==========
        function playerHit() {
            player.lives--;
            document.getElementById('lives').textContent = '❤️'.repeat(Math.max(0, player.lives));
            
            const warning = document.getElementById('warning');
            warning.classList.add('active');
            setTimeout(() => warning.classList.remove('active'), 300);
            
            if (player.lives <= 0) {
                running = false;
                document.getElementById('deathLevel').textContent = level;
                document.getElementById('gameOver').style.display = 'flex';
                document.exitPointerLock();
            }
        }

        function updateLivesUI() {
            document.getElementById('lives').textContent = '❤️'.repeat(Math.max(0, player.lives));
            document.getElementById('zombieCount').textContent = zombies.filter(z => !z.stunned).length;
        }

        // ========== 检查胜利 ==========
        function checkWin() {
            const exitPos = gridToWorld(exitX, exitZ);
            const dx = player.x - exitPos.x;
            const dz = player.z - exitPos.z;
            return Math.sqrt(dx * dx + dz * dz) < CELL_SIZE;
        }

        // ========== 游戏主循环 ==========
        let lastTime = 0;
        let canAttack = true;
        
        function animate(time = 0) {
            requestAnimationFrame(animate);
            
            const dt = Math.min((time - lastTime) / 1000, 0.1);
            lastTime = time;

            if (!running) {
                renderer.render(scene, camera);
                return;
            }

            // 输入
            let moveX = 0, moveZ = 0;
            if (keys['KeyW'] || keys['ArrowUp']) moveZ = -1;
            if (keys['KeyS'] || keys['ArrowDown']) moveZ = 1;
            if (keys['KeyA'] || keys['ArrowLeft']) moveX = -1;
            if (keys['KeyD'] || keys['ArrowRight']) moveX = 1;

            // 跳跃
            if (keys['Space'] && player.grounded) {
                player.vy = JUMP_FORCE;
                player.grounded = false;
                keys['Space'] = false;
            }

            // 移动
            const angle = player.rotY;
            const vx = (Math.sin(angle) * moveZ + Math.cos(angle) * moveX) * MOVE_SPEED;
            const vz = (Math.cos(angle) * moveZ - Math.sin(angle) * moveX) * MOVE_SPEED;

            const newX = player.x + vx * dt;
            const newZ = player.z + vz * dt;

            if (canMoveTo(newX, player.z)) player.x = newX;
            if (canMoveTo(player.x, newZ)) player.z = newZ;

            // 重力
            if (!player.grounded) {
                player.vy -= GRAVITY * dt;
            }
            player.y += player.vy * dt;

            if (player.y <= PLAYER_HEIGHT) {
                player.y = PLAYER_HEIGHT;
                player.vy = 0;
                player.grounded = true;
            }

            // 陷阱
            if (checkTrapDamage()) {
                playerHit();
            }

            // 更新僵尸
            for (const zombie of zombies) {
                if (zombie.update(dt)) {
                    playerHit();
                }
            }
            updateLivesUI();

            // 相机
            camera.position.set(player.x, player.y, player.z);
            camera.rotation.set(0, 0, 0);
            camera.rotateY(player.rotY);
            camera.rotateX(player.rotX);

            // 玩家灯光
            const pl = scene.getObjectByName('playerLight');
            if (pl) {
                pl.position.set(player.x, player.y + 2, player.z);
            }

            // 检查胜利
            if (checkWin()) {
                level++;
                if (level > 16) {
                    running = false;
                    document.getElementById('winScreen').style.display = 'flex';
                    document.exitPointerLock();
                } else {
                    loadLevel();
                }
            }

            updateMinimap();
            renderer.render(scene, camera);
        }

        // ========== 关卡管理 ==========
        function loadLevel() {
            generateMaze();
            createScene();

            // 玩家出生在格子(3,3)中心
            const spawnPos = gridToWorld(3, 3);
            player.x = spawnPos.x;
            player.y = PLAYER_HEIGHT;
            player.z = spawnPos.z;
            player.vx = player.vy = player.vz = 0;
            player.rotY = Math.PI * 0.75;  // 面向东南
            player.rotX = 0;
            player.grounded = true;
            player.lastDamageTime = 0;

            document.getElementById('level').textContent = level;
            updateLivesUI();
        }

        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameOver').style.display = 'none';
            document.getElementById('winScreen').style.display = 'none';
            
            level = 1;
            player.lives = 3;
            running = true;
            
            loadLevel();
            document.body.requestPointerLock();
        }

        // 点击攻击
        document.addEventListener('mousedown', (e) => {
            if (e.button === 0 && running && canAttack) {
                canAttack = false;
                attackZombie();
                setTimeout(() => canAttack = true, 500);
            }
        });

        // 启动
        window.addEventListener('load', init);
    </script>
</body>
</html>
